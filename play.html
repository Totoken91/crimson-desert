<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Désert Cramoisi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
:root {
  --bg: #080506; --bg2: #100b0a; --bg3: #160e0c;
  --crimson: #8C1C1C; --crimson-l: #BE372D; --rust: #6B2416;
  --bone: #C6B29B; --bone-dim: #8A7A6A;
  --ash: #3A3230; --ash-l: #5A4E4A; --pale: #E8DDD0;
  --col-d: #E24B4A; --col-s: #7F77DD; --col-o: #EF9F27;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'JetBrains Mono',monospace; color:var(--bone); cursor:none; user-select:none; }

/* ── LAYOUT ── */
#game { display:grid; grid-template-columns:1fr auto 1fr; width:100vw; height:100vh; }

/* ── PANELS ── */
.panel { position:relative; min-width:180px; overflow:hidden; }
.panel-canvas { position:absolute; inset:0; z-index:0; }
.panel-content { position:relative; z-index:1; padding:20px 16px; display:flex; flex-direction:column; gap:10px; height:100%; }
.panel-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.15em; color:var(--crimson); text-transform:uppercase; text-shadow:2px 2px 0 #3A0000; padding-bottom:8px; }

/* ── RESOURCES (organic SVGs) ── */
.res-row { display:flex; align-items:center; gap:6px; padding:3px 0; }
.res-label { font-size:13px; font-weight:500; text-shadow:2px 2px 0 #3A0000; width:16px; }
.res-shapes { display:flex; gap:2px; }
.res-shape { width:14px; height:14px; transition: opacity 0.3s; }
.res-shape.empty { opacity:0.15; }
.res-shape svg { width:100%; height:100%; }
/* Async pulsations */
.res-shape:nth-child(1) { animation: pulse-a 3s ease-in-out infinite; }
.res-shape:nth-child(2) { animation: pulse-a 3s ease-in-out 0.4s infinite; }
.res-shape:nth-child(3) { animation: pulse-a 3s ease-in-out 0.8s infinite; }
.res-shape:nth-child(4) { animation: pulse-a 3s ease-in-out 1.2s infinite; }
.res-shape:nth-child(5) { animation: pulse-a 3s ease-in-out 1.6s infinite; }
.res-shape:nth-child(6) { animation: pulse-a 3s ease-in-out 2.0s infinite; }
@keyframes pulse-a { 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(1.1) rotate(3deg)} }

.res-num { margin-left:auto; font-size:10px; color:var(--bone-dim); text-shadow:2px 2px 0 #3A0000; }
.res-row.cap .res-num { animation: blink-cap 1.2s ease-in-out infinite; }
@keyframes blink-cap { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Vitality blocks */
#vitality-bar { display:flex; gap:3px; margin-top:12px; padding-top:10px; }
.vit-block { width:10px; height:10px; background:var(--ash); border-radius:1px; transition:background 0.3s; }
.vit-block.full { background:var(--ash-l); }
.vit-block.low { animation: blink-low 1.5s ease-in-out infinite; }
@keyframes blink-low { 0%,100%{opacity:1} 50%{opacity:0.15} }
.vit-block.empty { background:var(--crimson); opacity:0.15; }

/* ── RIGHT PANEL ── */
#btn-reset { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--ash-l); background:transparent; border:1px solid var(--ash); padding:4px 6px; cursor:none; text-align:center; letter-spacing:0.1em; margin-top:auto; opacity:0.4; transition:opacity 0.2s; }
#btn-reset:hover { opacity:0.8; border-color:var(--crimson); color:var(--crimson); }
#btn-voir { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--crimson); background:transparent; border:1px solid var(--ash); padding:6px; cursor:none; text-align:center; letter-spacing:0.1em; text-shadow:2px 2px 0 #3A0000; }
.recipe-item { padding:8px 0; border-bottom:1px dotted rgba(58,50,48,0.3); }
.recipe-item:last-child { border-bottom:none; }
.recipe-name { font-family:'Crimson Pro',serif; font-size:14px; color:var(--bone); text-shadow:2px 2px 0 #3A0000; margin-bottom:2px; }
.recipe-cost { font-size:10px; color:var(--bone-dim); margin-bottom:4px; }
.recipe-cost span { margin-right:6px; }
.recipe-btn { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--crimson); background:transparent; border:1px solid var(--ash); padding:3px 8px; cursor:none; letter-spacing:0.05em; text-shadow:1px 1px 0 #3A0000; }
.recipe-btn:disabled { opacity:0.2; }
#alchemy-msg { font-family:'Crimson Pro',serif; font-style:italic; font-size:12px; color:var(--bone-dim); margin-top:auto; }

/* ── SCENE WRAPPER ── */
#scene-wrapper { position:relative; display:flex; align-items:center; justify-content:center; background:var(--bg2); overflow:hidden; }
#pixi-container { position:relative; aspect-ratio:4/3; height:100%; max-height:100%; }

/* ── HOTSPOT OVERLAY (HTML on top of PixiJS) ── */
#hotspot-layer { position:absolute; inset:0; z-index:10; }
.hotspot { position:absolute; background:rgba(140,28,28,0.06); border:1px dashed rgba(190,55,45,0.25); cursor:none; padding:0; border-radius:2px; }
.hotspot:hover { background:rgba(140,28,28,0.15); border-color:rgba(190,55,45,0.45); }
.exit-zone { position:absolute; z-index:6; cursor:none; background:transparent; border:none; padding:0; }
.exit-zone:not(.locked):hover { background:rgba(190,55,45,0.06); }

/* Hold bar */
.hold-bar { position:absolute; bottom:-4px; left:10%; right:10%; height:2px; background:var(--ash); }
.hold-bar-fill { height:100%; width:0%; background:var(--crimson); }

/* Float text */
.float-text { position:absolute; font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:500; pointer-events:none; z-index:30; }

/* ── DIALOGUE ── */
#dialogue { position:absolute; bottom:0; left:0; right:0; height:80px; background:rgba(13,9,0,0.95); border-top:1px solid var(--ash); display:flex; align-items:flex-start; gap:12px; padding:10px 16px; z-index:40; opacity:0; transform:translateY(10px); pointer-events:none; }
#dialogue.visible { opacity:1; transform:translateY(0); pointer-events:auto; }
#portrait { width:48px; height:48px; background:var(--bg3); border:1px solid var(--ash); flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#portrait canvas { width:48px; height:48px; image-rendering:pixelated; }
#portrait-label { font-size:7px; letter-spacing:0.2em; color:var(--ash-l); margin-top:2px; }
#dialogue-content { flex:1; display:flex; flex-direction:column; justify-content:center; min-height:48px; }
#dialogue-text { font-family:'Crimson Pro',serif; font-size:15px; color:var(--bone); line-height:1.5; text-shadow:1px 1px 0 #2A0000; }
#dialogue-text .corrupt { color:var(--crimson); }
#dialogue-arrow { font-size:10px; color:var(--ash-l); margin-top:4px; display:none; }
#dialogue-arrow.visible { display:block; }

/* ── CURSOR ── */
#cursor { position:fixed; pointer-events:none; z-index:1000; transform:translate(-50%,-50%); }
#cursor svg { width:24px; height:24px; fill:none; stroke:var(--bone-dim); stroke-width:1.5; filter:drop-shadow(0 0 3px rgba(140,28,28,0.3)); }
</style>
</head>
<body>

<!-- CURSOR -->
<div id="cursor">
  <svg viewBox="0 0 24 24" id="cursor-svg">
    <circle cx="12" cy="12" r="8" />
    <circle cx="12" cy="12" r="2" fill="currentColor" />
  </svg>
</div>

<!-- GAME -->
<div id="game">

  <!-- LEFT PANEL -->
  <div class="panel" id="panel-left">
    <canvas class="panel-canvas" id="panel-left-bg"></canvas>
    <div class="panel-content">
      <div class="panel-title">Ressources</div>
      <div class="res-row" id="res-d"><span class="res-label" style="color:var(--col-d)">D</span><div class="res-shapes" id="shapes-d"></div><span class="res-num" id="num-d"></span></div>
      <div class="res-row" id="res-s"><span class="res-label" style="color:var(--col-s)">S</span><div class="res-shapes" id="shapes-s"></div><span class="res-num" id="num-s"></span></div>
      <div class="res-row" id="res-o"><span class="res-label" style="color:var(--col-o)">O</span><div class="res-shapes" id="shapes-o"></div><span class="res-num" id="num-o"></span></div>
      <div id="vitality-bar"></div>
      <button id="btn-reset">[ reset ]</button>
    </div>
  </div>

  <!-- SCENE -->
  <div id="scene-wrapper">
    <div id="pixi-container">
      <div id="hotspot-layer"></div>
      <div id="dialogue">
        <div id="portrait"><canvas width="16" height="16"></canvas><span id="portrait-label">ANOMALIE</span></div>
        <div id="dialogue-content"><div id="dialogue-text"></div><div id="dialogue-arrow">▼</div></div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel" id="panel-right">
    <canvas class="panel-canvas" id="panel-right-bg"></canvas>
    <div class="panel-content">
      <div class="panel-title">Alchimie</div>
      <button id="btn-voir">[ VOIR ]</button>
      <div id="recipe-list"></div>
      <div id="alchemy-msg">Trouve un point d'invocation.</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// ORGANIC PANEL BACKGROUNDS
// ══════════════════════════════════════
function drawPanelBg(canvasId, side) {
  const canvas = document.getElementById(canvasId);
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // Base fill
  ctx.fillStyle = '#100b0a';
  ctx.fillRect(0, 0, w, h);

  // Irregular edge (the side facing the scene)
  ctx.beginPath();
  const edgeX = side === 'left' ? w : 0;
  const steps = 20;
  ctx.moveTo(edgeX, 0);
  for (let i = 0; i <= steps; i++) {
    const y = (h / steps) * i;
    const wobble = Math.sin(i * 0.7) * 4 + Math.cos(i * 1.3) * 3 + (Math.random() - 0.5) * 2;
    const x = side === 'left' ? w - 1 + wobble : 1 - wobble;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  // close with straight lines
  ctx.lineTo(side === 'left' ? 0 : w, h);
  ctx.lineTo(side === 'left' ? 0 : w, 0);
  ctx.closePath();
  ctx.fillStyle = '#100b0a';
  ctx.fill();

  // Draw the wobbly border line
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const y = (h / steps) * i;
    const wobble = Math.sin(i * 0.7) * 4 + Math.cos(i * 1.3) * 3;
    const x = side === 'left' ? w - 1 + wobble : 1 - wobble;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#2a1210';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Stain spots
  for (let i = 0; i < 5; i++) {
    const sx = Math.random() * w;
    const sy = Math.random() * h;
    const sr = 15 + Math.random() * 30;
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    grad.addColorStop(0, `rgba(140,28,28,${0.03 + Math.random()*0.04})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
  }

  // Noise texture
  const imgData = ctx.getImageData(0, 0, w, h);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 8;
    imgData.data[i] += n;
    imgData.data[i+1] += n;
    imgData.data[i+2] += n;
  }
  ctx.putImageData(imgData, 0, 0);
}

// Redraw on resize
function drawPanels() {
  drawPanelBg('panel-left-bg', 'left');
  drawPanelBg('panel-right-bg', 'right');
}

// ══════════════════════════════════════
// PIXI.JS SCENE
// ══════════════════════════════════════
const pixiContainer = document.getElementById('pixi-container');
const app = new PIXI.Application({
  resizeTo: pixiContainer,
  backgroundAlpha: 0,
  antialias: false,
});
pixiContainer.insertBefore(app.view, pixiContainer.firstChild);
app.view.style.position = 'absolute';
app.view.style.inset = '0';
app.view.style.width = '100%';
app.view.style.height = '100%';
app.view.style.zIndex = '0';

let sceneSprite = null;
let displacementSprite = null;
let displacementFilter = null;
let organicFilter = null;

// Generate noise texture for displacement
function createNoiseTexture(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(size, size);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255;
    img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v; img.data[i+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  return PIXI.Texture.from(canvas);
}

// Custom GLSL filter — FBM vignette + chromatic aberration
const ORGANIC_FRAG = `
precision mediump float;
varying vec2 vTextureCoord;
uniform sampler2D uSampler;
uniform float uTime;
uniform float uPain;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0;
  float a = 0.5;
  for (int i = 0; i < 4; i++) {
    v += a * noise(p);
    p *= 2.0;
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = vTextureCoord;

  // Chromatic aberration — scales with pain
  float aberr = (1.0 + uPain * 4.0) / 512.0;
  float r = texture2D(uSampler, uv + vec2(aberr, 0.0)).r;
  float g = texture2D(uSampler, uv).g;
  float b = texture2D(uSampler, uv - vec2(aberr, 0.0)).b;
  vec4 col = vec4(r, g, b, 1.0);

  // FBM pulse on dark areas — subtle crimson breathing
  float n = fbm(uv * 4.0 + uTime * 0.08);
  float lum = dot(col.rgb, vec3(0.299, 0.587, 0.114));
  float darkPulse = (1.0 - lum) * n * 0.06;
  col.r += darkPulse * 1.5;
  col.g += darkPulse * 0.3;

  // Organic vignette — noise-distorted
  vec2 center = uv - 0.5;
  float nVig = fbm(uv * 3.0 + uTime * 0.05);
  float dist = length(center * vec2(1.1 + nVig * 0.15, 1.0 + nVig * 0.1));
  float vig = smoothstep(0.35, 0.75, dist);
  col.rgb *= 1.0 - vig * 0.7;

  gl_FragColor = col;
}
`;

function setupPixiScene(imagePath) {
  // Clear previous
  if (sceneSprite) { app.stage.removeChild(sceneSprite); sceneSprite.destroy(); }

  const tex = PIXI.Texture.from(imagePath);
  sceneSprite = new PIXI.Sprite(tex);
  sceneSprite.width = app.screen.width;
  sceneSprite.height = app.screen.height;
  app.stage.addChildAt(sceneSprite, 0);

  // Displacement filter
  if (!displacementSprite) {
    const noiseTex = createNoiseTexture(256);
    displacementSprite = new PIXI.Sprite(noiseTex);
    displacementSprite.texture.baseTexture.wrapMode = PIXI.WRAP_MODES.REPEAT;
    app.stage.addChild(displacementSprite);
    displacementFilter = new PIXI.DisplacementFilter(displacementSprite);
    displacementFilter.scale.set(0);
  }

  // Organic GLSL filter
  if (!organicFilter) {
    organicFilter = new PIXI.Filter(null, ORGANIC_FRAG, {
      uTime: 0.0,
      uPain: 0.0,
    });
  }

  // Filters applied by ticker only when damaged
  sceneSprite.filters = [];

  // Resize handler
  const onResize = () => {
    if (sceneSprite && sceneSprite.texture) {
      sceneSprite.width = app.screen.width;
      sceneSprite.height = app.screen.height;
    }
  };
  app.renderer.on('resize', onResize);
}

// Animate displacement + shader uniforms
let pixiTime = 0;
// ══════════════════════════════════════
// SVG RESOURCE SHAPES
// ══════════════════════════════════════
const SVG_SHAPES = {
  douleur: `<svg viewBox="0 0 14 14"><path d="M7 1C6 4 3 6 3 9c0 2.5 1.8 4 4 4s4-1.5 4-4C11 6 8 4 7 1z" fill="currentColor" opacity="0.9"/></svg>`,
  souffle: `<svg viewBox="0 0 14 14"><path d="M7 2a5 5 0 014.5 4.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M7 2a5 5 0 00-3.5 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/></svg>`,
  organique: `<svg viewBox="0 0 14 14"><path d="M7 2C4 2 2.5 4 3 7c.5 3 2 4.5 4.5 4.5S11.5 10 11 7C10.5 4 10 2 7 2z" fill="currentColor" opacity="0.85"/></svg>`,
};

const RES_COLORS = { douleur:'var(--col-d)', souffle:'var(--col-s)', organique:'var(--col-o)' };

// ══════════════════════════════════════
// CURSOR (animated SVG)
// ══════════════════════════════════════
const cursorEl = document.getElementById('cursor');
const cursorSvg = document.getElementById('cursor-svg');
let cursorType = 'default';
let cursorTween = null;

// Continuous idle animation
gsap.to(cursorSvg, { rotation: 360, duration: 20, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

function setCursor(type) {
  if (type === cursorType) return;
  cursorType = type;
  if (cursorTween) cursorTween.kill();

  const svg = cursorSvg;
  svg.style.stroke = type === 'hand' ? 'var(--col-o)' : type === 'eye' ? 'var(--col-s)' : type === 'flame' ? 'var(--crimson-l)' : type === 'exit' ? 'var(--pale)' : type === 'locked' ? 'var(--ash)' : 'var(--bone-dim)';

  if (type === 'hand') {
    // Contract on douleur
    cursorTween = gsap.to(svg, { scale: 0.7, duration: 0.15, yoyo: true, repeat: 1, ease: 'power4.in' });
  } else if (type === 'flame') {
    // Slow rotate on alchemy
    cursorTween = gsap.to(svg, { rotation: '+=360', duration: 4, repeat: -1, ease: 'none' });
  } else if (type === 'eye') {
    // Pulse on souffle
    cursorTween = gsap.to(svg, { scale: 1.2, duration: 0.6, yoyo: true, repeat: -1, ease: 'sine.inOut' });
  } else {
    gsap.to(svg, { scale: 1, duration: 0.2 });
  }
}

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

// ══════════════════════════════════════
// PORTRAIT
// ══════════════════════════════════════
function drawPortrait() {
  const canvas = document.querySelector('#portrait canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0506';
  ctx.fillRect(0, 0, 16, 16);
  ctx.fillStyle = '#3A3230';
  ctx.fillRect(5, 3, 6, 8);
  ctx.fillStyle = '#6B2416';
  ctx.fillRect(6, 5, 2, 2);
  ctx.fillRect(9, 5, 2, 2);
  ctx.fillStyle = '#8C1C1C';
  ctx.fillRect(7, 9, 3, 1);
}

app.ticker.add((delta) => {
  if (!sceneSprite || !state) return;

  // Full life = no filters, crisp image, zero GPU cost
  const damaged = state.vitality < state.vitalityMax;

  if (!damaged) {
    if (sceneSprite.filters && sceneSprite.filters.length > 0) sceneSprite.filters = [];
    return;
  }

  // Enable filters only when damaged
  if (!sceneSprite.filters || sceneSprite.filters.length === 0) {
    sceneSprite.filters = [displacementFilter, organicFilter];
  }

  pixiTime += delta * 0.01;

  // Displacement scales with vitality loss
  if (displacementSprite) {
    displacementSprite.x += 0.2;
    displacementSprite.y += 0.15;
    const vitalityRatio = state.vitality / state.vitalityMax;
    displacementFilter.scale.set((1 - vitalityRatio) * 15);
  }

  // GLSL uniforms
  if (organicFilter) {
    organicFilter.uniforms.uTime = pixiTime;
    organicFilter.uniforms.uPain = state.painLevel;
  }
});

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const SAVE_KEY = 'desert-cramoisi-state';
const CAPS = { douleur:5, souffle:4, organique:6 };
const ORGANIQUE_SAFE = 5;
const ORGANIQUE_DECAY_MS = 120000;
const ORGANIQUE_RESPAWN_MS = 480000;
const DEFAULT_STATE = {
  currentScene:'scene-01', inventory:{douleur:0,souffle:0,organique:0},
  vitality:10, vitalityMax:10, painLevel:0.0, crafted:[], inspected:{},
  exits:{}, souffleCollected:{}, organicRespawn:{},
  organicDecayStart:null, painAbsorbActive:false, narrativeFlags:{},
};
let state = loadState();
function loadState(){try{const s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s&&s.inventory)return s}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_STATE))}
function saveState(){localStorage.setItem(SAVE_KEY,JSON.stringify(state))}
function resetState(){const k={painLevel:state.painLevel,narrativeFlags:{...state.narrativeFlags}};state=JSON.parse(JSON.stringify(DEFAULT_STATE));state.painLevel=k.painLevel;state.narrativeFlags=k.narrativeFlags;saveState()}

// ══════════════════════════════════════
// RECIPES

// ══════════════════════════════════════
// DOM REFS
// ══════════════════════════════════════
const $=id=>document.getElementById(id);
const hotspotLayer=$('hotspot-layer');
const dialogueEl=$('dialogue');
const dialogueText=$('dialogue-text');
const dialogueArrow=$('dialogue-arrow');
const alchemyMsg=$('alchemy-msg');
const recipeListEl=$('recipe-list');
const vitalityBar=$('vitality-bar');
let activeAlchemyPoint=false;

// ══════════════════════════════════════
// UI RENDERING
// ══════════════════════════════════════
const GLITCHS='░▒▓█▄▀■□▪▫';
function glitchText(t){if(state.vitality>2)return t;return t.split('').map(c=>Math.random()<0.12?GLITCHS[Math.floor(Math.random()*GLITCHS.length)]:c).join('')}

function updateResourceUI(){
  ['douleur','souffle','organique'].forEach(key=>{
    const s=key==='douleur'?'d':key==='souffle'?'s':'o';
    const val=state.inventory[key],cap=CAPS[key];
    const cont=$('shapes-'+s);cont.innerHTML='';
    for(let i=0;i<cap;i++){const d=document.createElement('div');d.className='res-shape'+(i>=val?' empty':'');d.style.color=RES_COLORS[key];d.innerHTML=SVG_SHAPES[key];cont.appendChild(d)}
    $('num-'+s).textContent=val+'/'+cap;
    $('res-'+s).classList.toggle('cap',val>=cap);
    $('res-'+s).querySelector('.res-label').textContent=glitchText(s.toUpperCase());
  });
}
function updateVitalityUI(){
  vitalityBar.innerHTML='';
  for(let i=0;i<state.vitalityMax;i++){const b=document.createElement('div');b.className='vit-block';if(i<state.vitality){b.classList.add('full');if(state.vitality<=2)b.classList.add('low')}else b.classList.add('empty');vitalityBar.appendChild(b)}
}
function updateRecipeUI(){
  recipeListEl.innerHTML='';const onAlch=activeAlchemyPoint;
  RECIPES.forEach(r=>{const canAfford=Object.entries(r.cost).every(([k,v])=>state.inventory[k]>=v);const done=state.crafted.includes(r.id);const can=canAfford&&onAlch&&!done;
    const div=document.createElement('div');div.className='recipe-item';
    div.innerHTML=`<div class="recipe-name">${done?'✓ ':''}${r.name}</div><div class="recipe-cost">${r.cost.douleur?`<span style="color:var(--col-d)">D×${r.cost.douleur}</span>`:''} ${r.cost.souffle?`<span style="color:var(--col-s)">S×${r.cost.souffle}</span>`:''} ${r.cost.organique?`<span style="color:var(--col-o)">O×${r.cost.organique}</span>`:''}</div><button class="recipe-btn" ${can?'':'disabled'}>${done?'accompli':'accomplir'}</button>`;
    if(can)div.querySelector('.recipe-btn').addEventListener('click',()=>craftRecipe(r));
    recipeListEl.appendChild(div)});
  alchemyMsg.textContent=onAlch?'':'Trouve un point d\'invocation.';alchemyMsg.style.display=onAlch?'none':'block';
}

// ══════════════════════════════════════
// DIALOGUE (scrambled typewriter)
// ══════════════════════════════════════
let typingTimer=null,dialogueFinished=false,dialogueFullText='';
function showDialogue(text){
  clearTyping();dialogueFullText=text;dialogueFinished=false;dialogueText.textContent='';
  dialogueArrow.classList.remove('visible');
  gsap.to(dialogueEl,{opacity:1,y:0,duration:0.3,ease:'power2.out'});dialogueEl.classList.add('visible');
  const chars=text.split('');let i=0;
  function typeNext(){if(i>=chars.length){dialogueFinished=true;dialogueArrow.classList.add('visible');return}
    let ch=chars[i];if(state.vitality<=1&&Math.random()<0.125){const sp=document.createElement('span');sp.className='corrupt';sp.textContent=GLITCHS[Math.floor(Math.random()*GLITCHS.length)];dialogueText.appendChild(sp)}
    else dialogueText.appendChild(document.createTextNode(ch));i++;
    typingTimer=setTimeout(typeNext,15+Math.random()*25+(ch==='.'||ch==='—'?120:0))}
  typeNext();
}
function clearTyping(){if(typingTimer){clearTimeout(typingTimer);typingTimer=null}}
function closeDialogue(){if(!dialogueFinished){clearTyping();dialogueText.textContent=dialogueFullText;dialogueFinished=true;dialogueArrow.classList.add('visible');return}gsap.to(dialogueEl,{opacity:0,y:10,duration:0.2});dialogueEl.classList.remove('visible');dialogueFinished=false}
dialogueEl.addEventListener('click',e=>{e.stopPropagation();closeDialogue()});

// ══════════════════════════════════════
// FLOAT + FLASH
// ══════════════════════════════════════
function floatText(x,y,text,color){const el=document.createElement('div');el.className='float-text';el.textContent=text;el.style.color=color;el.style.left=x+'%';el.style.top=y+'%';hotspotLayer.appendChild(el);gsap.fromTo(el,{y:0,opacity:1},{y:-40,opacity:0,duration:1,ease:'expo.out',onComplete:()=>el.remove()})}
function flashPain(){const f=document.createElement('div');f.style.cssText='position:absolute;inset:0;background:var(--crimson);pointer-events:none;z-index:20;opacity:0';hotspotLayer.appendChild(f);gsap.fromTo(f,{opacity:0.35},{opacity:0,duration:0.3,ease:'power4.in',onComplete:()=>f.remove()})}

// ══════════════════════════════════════
// RESOURCE + VITALITY + CRAFT
// ══════════════════════════════════════
function collectResource(type,amount,hx,hy){if(state.inventory[type]>=CAPS[type]){if(type==='douleur')showDialogue("Tu ne peux pas porter plus que ça.");return false}const actual=Math.min(amount,CAPS[type]-state.inventory[type]);state.inventory[type]+=actual;if(type==='douleur'){loseVitality(actual);flashPain()}floatText(hx+2,hy-5,'+'+actual,RES_COLORS[type]);updateResourceUI();saveState();return true}
function loseVitality(n){state.vitality=Math.max(0,state.vitality-n);updateVitalityUI();saveState();if(state.vitality===0)triggerDeath()}
function triggerDeath(){if(displacementFilter)gsap.to(displacementFilter.scale,{x:60,y:60,duration:1,ease:'power4.in'});const ov=document.createElement('div');ov.style.cssText='position:absolute;inset:0;background:#000;opacity:0;z-index:50;pointer-events:none';hotspotLayer.parentElement.appendChild(ov);gsap.to(ov,{opacity:1,duration:3,ease:'power2.in'});setTimeout(()=>showDialogue("Tu t'es dissous avant d'avoir compris."),1500);setTimeout(()=>{resetState();ov.remove();loadScene(state.currentScene)},5000)}
function craftRecipe(r){for(const[k,v]of Object.entries(r.cost))state.inventory[k]-=v;state.crafted.push(r.id);if(r.mechanic==='reveal-hotspots'||r.mechanic==='unlock-narrative')revealConditionalHotspots(r.id);else if(r.mechanic==='pain-absorb')state.painAbsorbActive=true;else if(r.mechanic==='unlock-exit'){const scene=SCENES[state.currentScene];const exit=scene.exits.find(e=>e.id===r.targetExit);if(exit){state.exits[exit.id]=true;renderExits(scene)}}showDialogue(r.sceneReaction);updateResourceUI();updateRecipeUI();saveState()}
function revealConditionalHotspots(rid){SCENES[state.currentScene].hotspots.forEach(hs=>{if(hs.unlockedBy===rid){const el=document.getElementById('hs-el-'+hs.id);if(el){el.style.display='block';gsap.fromTo(el,{opacity:0},{opacity:1,duration:1.5,ease:'expo.out'})}}})}

// ══════════════════════════════════════
// HOLD
// ══════════════════════════════════════
let holdTimer=null,holdStart=0,holdHs=null,holdTierIndex=0,holdBarEl=null;
function startHold(hs,el){holdHs=hs;holdStart=Date.now();holdTierIndex=0;holdBarEl=document.createElement('div');holdBarEl.className='hold-bar';holdBarEl.innerHTML='<div class="hold-bar-fill"></div>';el.appendChild(holdBarEl);holdTimer=setInterval(()=>{const elapsed=Date.now()-holdStart;const pct=Math.min(elapsed/hs.holdMax*100,100);holdBarEl.querySelector('.hold-bar-fill').style.width=pct+'%';while(holdTierIndex<hs.holdTiers.length&&elapsed>=hs.holdTiers[holdTierIndex].ms){const tier=hs.holdTiers[holdTierIndex];if(tier.resource)collectResource(tier.resource.type,tier.resource.amount,hs.x,hs.y);if(tier.text)showDialogue(tier.text);if(tier.painDelta){state.painLevel=Math.min(1,state.painLevel+tier.painDelta);saveState()}holdTierIndex++}if(elapsed>=hs.holdMax)endHold()},50)}
function endHold(){if(holdTimer){clearInterval(holdTimer);holdTimer=null}if(holdBarEl){holdBarEl.remove();holdBarEl=null}holdHs=null}

// ══════════════════════════════════════
// DECAY
// ══════════════════════════════════════
let decayTimer=null;
function startDecayTimer(){stopDecayTimer();decayTimer=setInterval(()=>{if(state.inventory.organique>ORGANIQUE_SAFE){state.inventory.organique--;if(!state.narrativeFlags['decay-warning']){showDialogue("Ça ne se conserve pas. Tu aurais dû t'en douter.");state.narrativeFlags['decay-warning']=true}updateResourceUI();saveState()}},ORGANIQUE_DECAY_MS)}
function stopDecayTimer(){if(decayTimer){clearInterval(decayTimer);decayTimer=null}}

// ══════════════════════════════════════
// SCENE TRANSITION (noise dissolve)
// ══════════════════════════════════════
function transitionToScene(tid){const ov=document.createElement('canvas');ov.style.cssText='position:absolute;inset:0;z-index:45;pointer-events:none';ov.width=pixiContainer.offsetWidth;ov.height=pixiContainer.offsetHeight;hotspotLayer.parentElement.appendChild(ov);const ctx=ov.getContext('2d');let p=0;const dissolve=()=>{p+=0.03;ctx.clearRect(0,0,ov.width,ov.height);for(let x=0;x<ov.width;x+=4){for(let y=0;y<ov.height;y+=4){if(Math.sin(x*0.05)*Math.cos(y*0.07)+Math.random()*0.3<p){ctx.fillStyle=Math.random()>0.5?'#8C1C1C':'#080506';ctx.fillRect(x,y,4,4)}}}if(p<1.2)requestAnimationFrame(dissolve);else{loadScene(tid);let r=1.2;const reveal=()=>{r-=0.04;ctx.clearRect(0,0,ov.width,ov.height);for(let x=0;x<ov.width;x+=4){for(let y=0;y<ov.height;y+=4){if(Math.sin(x*0.05)*Math.cos(y*0.07)+Math.random()*0.3<r){ctx.fillStyle=Math.random()>0.5?'#8C1C1C':'#080506';ctx.fillRect(x,y,4,4)}}}if(r>0)requestAnimationFrame(reveal);else ov.remove()};requestAnimationFrame(reveal)}};requestAnimationFrame(dissolve)}

// ══════════════════════════════════════
// SCENE LOADING
// ══════════════════════════════════════
function loadScene(sceneId){
  const scene=SCENES[sceneId];if(!scene)return;state.currentScene=sceneId;activeAlchemyPoint=false;
  setupPixiScene(scene.bg);
  hotspotLayer.querySelectorAll('.hotspot,.exit-zone').forEach(e=>e.remove());
  scene.hotspots.forEach(hs=>{const key=sceneId+':'+hs.id;
    if(hs.collectible&&hs.type==='souffle'&&state.souffleCollected[key])return;
    if(hs.collectible&&state.inspected[key]&&hs.type!=='organique')return;
    if(hs.collectible&&hs.type==='organique'&&state.organicRespawn[key]){if(Date.now()-state.organicRespawn[key]<(hs.respawnDelay||ORGANIQUE_RESPAWN_MS))return;else delete state.organicRespawn[key]}
    const isVisible=hs.visible||(hs.unlockedBy&&state.crafted.includes(hs.unlockedBy));
    const el=createHotspotEl(hs,sceneId);if(!isVisible)el.style.display='none';
  });
  renderExits(scene);
  if(!state.narrativeFlags['intro-'+sceneId]){setTimeout(()=>{showDialogue(scene.intro);state.narrativeFlags['intro-'+sceneId]=true;saveState()},600)}
  updateResourceUI();updateVitalityUI();updateRecipeUI();saveState();
}
function createHotspotEl(hs,sceneId){const el=document.createElement('button');el.className='hotspot';el.id='hs-el-'+hs.id;el.style.cssText=`left:${hs.x}%;top:${hs.y}%;width:${hs.w}%;height:${hs.h}%`;el.addEventListener('mouseenter',()=>setCursor(hs.cursor||'eye'));el.addEventListener('mouseleave',()=>setCursor('default'));if(hs.collectMode==='hold'){el.addEventListener('mousedown',e=>{e.preventDefault();startHold(hs,el)});el.addEventListener('mouseup',()=>endHold());el.addEventListener('mouseleave',()=>endHold())}else el.addEventListener('click',()=>handleHotspotClick(hs,el,sceneId));hotspotLayer.appendChild(el);return el}
function handleHotspotClick(hs,el,sceneId){if(hs.action==='open-alchemy'){activeAlchemyPoint=true;updateRecipeUI();showDialogue("Le cercle attend.");return}if(hs.texts&&hs.texts.length)showDialogue(hs.texts[Math.floor(Math.random()*hs.texts.length)]);if(hs.resource){const ok=collectResource(hs.resource.type,hs.resource.amount,hs.x+hs.w/2,hs.y+hs.h/2);if(!ok)return;if(hs.flashOnCollect)flashPain();const key=sceneId+':'+hs.id;if(hs.collectible){state.inspected[key]=true;if(hs.souffleUnique)state.souffleCollected[key]=true;if(hs.type==='organique')state.organicRespawn[key]=Date.now();gsap.to(el,{opacity:0,scale:hs.type==='souffle'?1:0.6,duration:0.4,ease:'expo.out',onComplete:()=>el.remove()})}saveState()}if(!hs.resource&&hs.type==='inspect'){state.inspected[sceneId+':'+hs.id]=true;saveState()}}
function renderExits(scene){hotspotLayer.querySelectorAll('.exit-zone').forEach(e=>e.remove());scene.exits.forEach(exit=>{const el=document.createElement('button');el.className='exit-zone';el.style.cssText=`left:${exit.x}%;top:${exit.y}%;width:${exit.w}%;height:${exit.h}%`;const isLocked=exit.locked&&!state.exits[exit.id]&&!(exit.unlockedBy&&state.crafted.includes(exit.unlockedBy));if(isLocked){el.classList.add('locked');el.addEventListener('mouseenter',()=>setCursor('locked'));el.addEventListener('click',()=>showDialogue(exit.lockedText))}else{el.addEventListener('mouseenter',()=>setCursor('exit'));el.addEventListener('click',()=>transitionToScene(exit.targetScene))}el.addEventListener('mouseleave',()=>setCursor('default'));hotspotLayer.appendChild(el)})}

// RESET
$('btn-reset').addEventListener('click',()=>{localStorage.removeItem(SAVE_KEY);state=JSON.parse(JSON.stringify(DEFAULT_STATE));loadScene('scene-01')});

// VOIR
$('btn-voir').addEventListener('click',()=>{hotspotLayer.querySelectorAll('.hotspot').forEach(el=>{el.style.background='rgba(140,28,28,0.15)';el.style.borderColor='rgba(190,55,45,0.5)'});setTimeout(()=>hotspotLayer.querySelectorAll('.hotspot').forEach(el=>{el.style.background='';el.style.borderColor=''}),3000)});

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
drawPortrait();drawPanels();
window.addEventListener('resize',()=>{drawPanels();if(sceneSprite){sceneSprite.width=app.screen.width;sceneSprite.height=app.screen.height}});
startDecayTimer();loadScene(state.currentScene);
</script>
