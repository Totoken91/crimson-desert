<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
:root {
  --bg: #080506; --bg2: #100b0a; --bg3: #160e0c;
  --crimson: #8C1C1C; --crimson-l: #BE372D; --rust: #6B2416;
  --bone: #C6B29B; --bone-dim: #8A7A6A;
  --ash: #3A3230; --ash-l: #5A4E4A; --pale: #E8DDD0;
  --col-d: #E24B4A; --col-s: #7F77DD; --col-o: #EF9F27;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Press Start 2P',monospace; color:var(--bone); cursor:none; user-select:none; display:flex; align-items:center; justify-content:center; min-height:100vh; }

/* ── LAYOUT — fixed 1280×720 ── */
#game { position:relative; width:1280px; height:720px; background:var(--bg); overflow:hidden; }

/* ── PANELS — absolute positioned ── */
.panel { position:absolute; top:0; width:160px; height:720px; overflow:visible; background:var(--bg2); }
#panel-left { left:0; }
#panel-right { right:0; }
.panel-canvas { position:absolute; inset:0; z-index:0; }
.panel-content { position:relative; z-index:2; padding:20px 14px; display:flex; flex-direction:column; gap:10px; height:100%; }
.panel-title { font-family:'Press Start 2P',monospace; font-size:8px; letter-spacing:0.15em; color:var(--crimson); text-transform:uppercase; padding-bottom:8px; border-bottom:1px solid var(--ash); margin-bottom:4px; }
#panel-left { border-right:1px solid var(--ash); }
#panel-right { border-left:1px solid var(--ash); }

/* ── RESOURCES ── */
.res-row { display:flex; align-items:center; gap:5px; padding:4px 0; }
.res-label { font-family:'Press Start 2P',monospace; font-size:10px; text-shadow:2px 2px 0 #3A0000; width:18px; }
.res-shapes { display:flex; gap:2px; align-items:center; }
.res-shape { font-family:'Press Start 2P',monospace; font-size:10px; line-height:1; transition:opacity 0.3s; }
.res-shape.empty { opacity:0.2; }
/* Async pulsations */
.res-shape:nth-child(1) { animation: pulse-a 4s ease-in-out infinite; }
.res-shape:nth-child(2) { animation: pulse-a 4s ease-in-out 0.5s infinite; }
.res-shape:nth-child(3) { animation: pulse-a 4s ease-in-out 1.0s infinite; }
.res-shape:nth-child(4) { animation: pulse-a 4s ease-in-out 1.5s infinite; }
.res-shape:nth-child(5) { animation: pulse-a 4s ease-in-out 2.0s infinite; }
.res-shape:nth-child(6) { animation: pulse-a 4s ease-in-out 2.5s infinite; }
@keyframes pulse-a { 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(1.05) rotate(2deg)} }

.res-num { margin-left:auto; font-family:'Press Start 2P',monospace; font-size:8px; color:var(--bone); }
.res-row.cap .res-num { animation: blink-cap 1.2s ease-in-out infinite; }
@keyframes blink-cap { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Vitality — hand-carved dashes */
#vitality-bar { display:flex; gap:0; margin-top:14px; padding-top:12px; flex-wrap:wrap; }
.vit-dash { font-family:'Press Start 2P',monospace; font-size:8px; line-height:1; color:#2A1010; transition:color 0.3s; }
.vit-dash.full { color:var(--crimson); }
.vit-dash.low { animation: flicker-vit 0.8s ease-in-out infinite; }
@keyframes flicker-vit { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── RIGHT PANEL ── */
#btn-reset { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--ash-l); background:transparent; border:1px solid var(--ash); padding:5px 8px; cursor:none; text-align:center; letter-spacing:0.1em; margin-top:auto; opacity:0.4; transition:all 0.2s; }
#btn-reset:hover { opacity:0.7; border-color:var(--crimson); color:var(--crimson); }
#btn-voir { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--bone-dim); background:transparent; border:1px solid var(--ash); padding:6px; cursor:none; text-align:center; letter-spacing:0.15em; transition:all 0.2s; }
#btn-voir:hover { border-color:var(--crimson-l); text-shadow:0 0 8px var(--crimson); }
.recipe-item { padding:8px 0; }
.recipe-sep { height:1px; background:linear-gradient(to right,transparent,#3A3230 20%,#3A3230 80%,transparent); opacity:0.4; margin:8px 0; }
.recipe-name { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--bone); margin-bottom:5px; line-height:1.4; }
.recipe-cost { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--bone-dim); margin-bottom:5px; }
.recipe-cost span { margin-right:4px; }
.recipe-btn { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--bone-dim); background:transparent; border:1px solid var(--ash); padding:4px 8px; cursor:none; letter-spacing:0.05em; transition:all 0.2s; border-radius:0; }
.recipe-btn:hover:not(:disabled) { border-color:var(--crimson); color:var(--crimson-l); }
.recipe-btn:disabled { opacity:0.3; cursor:not-allowed; }
#alchemy-msg { font-family:'Press Start 2P',monospace; font-size:6px; color:var(--ash-l); margin-top:auto; line-height:1.6; }

/* ── SCENE — fixed 960×720 ── */
#scene-wrapper { position:absolute; left:160px; top:0; width:960px; height:720px; background:var(--bg2); overflow:hidden; }
#pixi-container { position:absolute; inset:0; width:960px; height:720px; }
/* erosion supprimée */

/* ── HOTSPOT OVERLAY (HTML on top of PixiJS) ── */
#hotspot-layer { position:absolute; inset:0; z-index:10; }
.hotspot { position:absolute; background:rgba(140,28,28,0.06); border:1px dashed rgba(190,55,45,0.25); cursor:none; padding:0; border-radius:2px; }
.hotspot:hover { background:rgba(140,28,28,0.15); border-color:rgba(190,55,45,0.45); }
.exit-zone { position:absolute; z-index:6; cursor:none; background:transparent; border:none; padding:0; }
.exit-zone:not(.locked):hover { background:rgba(190,55,45,0.06); }

/* Hold bar */
.hold-bar { position:absolute; bottom:-4px; left:10px; right:10px; height:2px; background:var(--ash); }
.hold-bar-fill { height:100%; width:0%; background:var(--crimson); }

/* Float text */
.float-text { position:absolute; font-family:'Press Start 2P',monospace; font-size:10px; pointer-events:none; z-index:30; text-shadow:2px 2px 0 #000; }

/* ── DIALOGUE ── */
#dialogue { position:absolute; bottom:0; left:0; width:960px; height:140px; background:rgba(8,5,4,0.92); border-top:2px solid var(--ash); display:flex; align-items:flex-start; gap:14px; padding:16px 20px; z-index:40; opacity:0; transform:translateY(10px); pointer-events:none; }
#dialogue.visible { opacity:1; transform:translateY(0); pointer-events:auto; }
#portrait { width:48px; height:48px; background:var(--bg3); border:1px solid var(--ash); flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#portrait canvas { width:48px; height:48px; image-rendering:pixelated; }
#portrait-label { font-family:'Press Start 2P',monospace; font-size:5px; letter-spacing:0.1em; color:var(--ash-l); margin-top:2px; }
#dialogue-content { flex:1; display:flex; flex-direction:column; justify-content:center; min-height:48px; }
#dialogue-text { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--pale); line-height:1.8; text-shadow:2px 2px 0 #2A0000; }
#dialogue-text .corrupt { color:var(--crimson); }
#dialogue-arrow { font-size:10px; color:var(--ash-l); margin-top:4px; display:none; }
#dialogue-arrow.visible { display:block; }

/* ── CURSOR ── */
#cursor { position:fixed; pointer-events:none; z-index:1000; transform:translate(-50%,-50%); }
#cursor svg { width:24px; height:24px; fill:none; stroke:var(--bone-dim); stroke-width:1.5; filter:drop-shadow(0 0 3px rgba(140,28,28,0.3)); }
</style>

<script>
// ══════════════════════════════════════
// ORGANIC PANEL BACKGROUNDS
// ══════════════════════════════════════
function drawPanelBg(canvasId, side) {
  const canvas = document.getElementById(canvasId);
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // Base fill
  ctx.fillStyle = '#100b0a';
  ctx.fillRect(0, 0, w, h);

  // Irregular edge (the side facing the scene)
  ctx.beginPath();
  const edgeX = side === 'left' ? w : 0;
  const steps = 20;
  ctx.moveTo(edgeX, 0);
  for (let i = 0; i <= steps; i++) {
    const y = (h / steps) * i;
    const wobble = Math.sin(i * 0.7) * 4 + Math.cos(i * 1.3) * 3 + (Math.random() - 0.5) * 2;
    const x = side === 'left' ? w - 1 + wobble : 1 - wobble;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  // close with straight lines
  ctx.lineTo(side === 'left' ? 0 : w, h);
  ctx.lineTo(side === 'left' ? 0 : w, 0);
  ctx.closePath();
  ctx.fillStyle = '#100b0a';
  ctx.fill();

  // Draw the wobbly border line
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const y = (h / steps) * i;
    const wobble = Math.sin(i * 0.7) * 4 + Math.cos(i * 1.3) * 3;
    const x = side === 'left' ? w - 1 + wobble : 1 - wobble;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#2a1210';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Stain spots
  for (let i = 0; i < 5; i++) {
    const sx = Math.random() * w;
    const sy = Math.random() * h;
    const sr = 15 + Math.random() * 30;
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    grad.addColorStop(0, `rgba(140,28,28,${0.03 + Math.random()*0.04})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
  }

  // Noise texture
  const imgData = ctx.getImageData(0, 0, w, h);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 8;
    imgData.data[i] += n;
    imgData.data[i+1] += n;
    imgData.data[i+2] += n;
  }
  ctx.putImageData(imgData, 0, 0);
}

// Redraw on resize
function drawPanels() {
  drawPanelBg('panel-left-bg', 'left');
  drawPanelBg('panel-right-bg', 'right');
}

// ══════════════════════════════════════
// PIXI.JS SCENE
// ══════════════════════════════════════
const pixiContainer = document.getElementById('pixi-container');
const app = new PIXI.Application({
  width: 960,
  height: 720,
  backgroundAlpha: 0,
  antialias: false,
});
pixiContainer.insertBefore(app.view, pixiContainer.firstChild);
app.view.style.position = 'absolute';
app.view.style.inset = '0';
app.view.style.width = '100%';
app.view.style.height = '100%';
app.view.style.zIndex = '0';

let sceneSprite = null;

function setupPixiScene(imagePath) {
  if (sceneSprite) { app.stage.removeChild(sceneSprite); sceneSprite.destroy(); }
  const tex = PIXI.Texture.from(imagePath);
  sceneSprite = new PIXI.Sprite(tex);
  sceneSprite.width = 960;
  sceneSprite.height = 720;
  app.stage.addChildAt(sceneSprite, 0);
}

// ══════════════════════════════════════
// LOW VITALITY FX — lightweight, no GPU filters
// ══════════════════════════════════════
let pixelFlickerTimer = null;

function startPixelFlicker() {
  if (pixelFlickerTimer) return;
  const layer = document.getElementById('hotspot-layer');
  pixelFlickerTimer = setInterval(() => {
    if (!state || state.vitality >= 5) return; // only below 50%
    const count = Math.max(1, Math.floor((1 - state.vitality / state.vitalityMax) * 12));
    for (let i = 0; i < count; i++) {
      const px = document.createElement('div');
      const size = 4 + Math.floor(Math.random() * 12);
      px.style.cssText = `position:absolute;left:${Math.random()*920}px;top:${Math.random()*680}px;width:${size}px;height:${size}px;background:#000;pointer-events:none;z-index:15;`;
      layer.appendChild(px);
      setTimeout(() => px.remove(), 80 + Math.random() * 150);
    }
  }, 2000 + Math.random() * 2000);
}

function stopPixelFlicker() {
  if (pixelFlickerTimer) { clearInterval(pixelFlickerTimer); pixelFlickerTimer = null; }
}
// ══════════════════════════════════════
// SVG RESOURCE SHAPES
// ══════════════════════════════════════
const RES_CHARS = { douleur:'♦', souffle:'◌', organique:'●' };

const RES_COLORS = { douleur:'var(--col-d)', souffle:'var(--col-s)', organique:'var(--col-o)' };

// ══════════════════════════════════════
// CURSOR (animated SVG)
// ══════════════════════════════════════
const cursorEl = document.getElementById('cursor');
const cursorSvg = document.getElementById('cursor-svg');
let cursorType = 'default';
let cursorTween = null;

// Continuous idle animation
gsap.to(cursorSvg, { rotation: 360, duration: 20, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

function setCursor(type) {
  if (type === cursorType) return;
  cursorType = type;
  if (cursorTween) cursorTween.kill();

  const svg = cursorSvg;
  svg.style.stroke = type === 'hand' ? 'var(--col-o)' : type === 'eye' ? 'var(--col-s)' : type === 'flame' ? 'var(--crimson-l)' : type === 'exit' ? 'var(--pale)' : type === 'locked' ? 'var(--ash)' : 'var(--bone-dim)';

  if (type === 'hand') {
    // Contract on douleur
    cursorTween = gsap.to(svg, { scale: 0.7, duration: 0.15, yoyo: true, repeat: 1, ease: 'power4.in' });
  } else if (type === 'flame') {
    // Slow rotate on alchemy
    cursorTween = gsap.to(svg, { rotation: '+=360', duration: 4, repeat: -1, ease: 'none' });
  } else if (type === 'eye') {
    // Pulse on souffle
    cursorTween = gsap.to(svg, { scale: 1.2, duration: 0.6, yoyo: true, repeat: -1, ease: 'sine.inOut' });
  } else {
    gsap.to(svg, { scale: 1, duration: 0.2 });
  }
}

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

// ══════════════════════════════════════
// PORTRAIT
// ══════════════════════════════════════
function drawPortrait() {
  const canvas = document.querySelector('#portrait canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#080506';
  ctx.fillRect(0, 0, 16, 16);
  // Imperfect 6-pointed star — two offset triangles
  ctx.fillStyle = '#3A3230';
  ctx.beginPath(); ctx.moveTo(8,2); ctx.lineTo(13,11); ctx.lineTo(3,11); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(7,14); ctx.lineTo(2,6); ctx.lineTo(13,6); ctx.closePath(); ctx.fill();
  // Crimson edges
  ctx.strokeStyle = '#8C1C1C'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(8,2); ctx.lineTo(13,11); ctx.lineTo(3,11); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,14); ctx.lineTo(2,6); ctx.lineTo(13,6); ctx.closePath(); ctx.stroke();
}

// No GPU ticker — all FX are lightweight DOM-based

// STATE

const SAVE_KEY = 'desert-cramoisi-state';
const CAPS = { douleur:5, souffle:4, organique:6 };

};
let state = loadState();
function loadState(){try{const s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s&&s.inventory)return s}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_STATE))}
function saveState(){localStorage.setItem(SAVE_KEY,JSON.stringify(state))}
function resetState(){const k={painLevel:state.painLevel,narrativeFlags:{...state.narrativeFlags}};state=JSON.parse(JSON.stringify(DEFAULT_STATE));state.painLevel=k.painLevel;state.narrativeFlags=k.narrativeFlags;saveState()}

// RECIPES
// ══════════════════════════════════════
const RECIPES = [
  {id:'lanterne-os',name:"Lanterne d'os",cost:{douleur:2,souffle:1,organique:0},effect:"Révèle les zones cachées.",sceneReaction:"Quelque chose dans le sable répond à la lumière. Tu vois ce que tu ne voyais pas.",mechanic:'reveal-hotspots'},
  {id:'tuile-memoire',name:"Tuile de mémoire",cost:{douleur:3,souffle:2,organique:0},effect:"Grave un fragment dans le sable.",sceneReaction:"Tu n'es pas perdu. On ne perd pas ce qui a toujours été ici.",mechanic:'unlock-narrative'},

// SCENE DATA

    hotspots:[

      {id:'hs-couteau',type:'douleur',x:68,y:60,w:4,h:12,cursor:'hand',resource:{type:'douleur',amount:1},collectMode:'click',flashOnCollect:true,texts:["Tu appuies. Ça compte.","La douleur est une ressource comme les autres."],collectible:true,visible:true,unlockedBy:null},
      {id:'hs-rocher',type:'douleur',x:28,y:58,w:14,h:20,cursor:'hand',collectMode:'hold',holdMax:3000,holdTiers:[{ms:1000,resource:{type:'douleur',amount:1},text:"La pierre ne ressent rien. Toi si."},{ms:2000,resource:{type:'douleur',amount:1},text:"Tu continues. Pourquoi tu continues ?"},{ms:3000,resource:{type:'douleur',amount:1},text:"Tu pouvais t'arrêter. Tu ne l'as pas fait.",painDelta:0.05}],collectible:false,visible:true,unlockedBy:null},
      {id:'hs-alchimie',type:'alchimie',x:18,y:70,w:12,h:14,cursor:'flame',resource:null,collectMode:'click',texts:[],action:'open-alchemy',collectible:false,visible:true,unlockedBy:null},
      {id:'hs-horizon',type:'inspect',x:0,y:25,w:100,h:15,cursor:'eye',resource:null,collectMode:'click',texts:["L'horizon devrait être là. Il y est. Mais pas pour toi.","Tu n'as pas de direction. Tu as une présence."],collectible:false,visible:true,unlockedBy:null},
      {id:'hs-fissure',type:'douleur',x:60,y:52,w:8,h:14,cursor:'eye',resource:{type:'douleur',amount:2},collectMode:'click',texts:["La fissure saigne. Pas de sang — quelque chose d'autre.","Tu aurais dû voir ça depuis le début."],collectible:true,visible:false,unlockedBy:'lanterne-os'},
      {id:'hs-empreinte',type:'organique',x:22,y:76,w:12,h:8,cursor:'hand',resource:{type:'organique',amount:1},collectMode:'click',texts:["Une empreinte dans le sable. La forme est la tienne.","Tu étais là avant. Tu ne te souviens pas. Le sable, oui."],collectible:true,visible:false,unlockedBy:'tuile-memoire'},
    ],exits:[{id:'exit-droite',targetScene:'scene-02',x:88,y:15,w:12,h:80,locked:true,lockedText:"Quelque chose bloque ce passage.",unlockedBy:'lien-nerf'}]},
  'scene-02':{id:'scene-02',label:'Les Ossements',intro:"Tu as déjà été ici. Pas toi. Quelque chose de toi.",bg:'desert-house-bg.png',
    hotspots:[
      {id:'hs-kyste',type:'organique',x:55,y:45,w:8,h:10,cursor:'hand',resource:{type:'organique',amount:2},collectMode:'click',texts:["Le kyste cède sous la pression.","Tu ne sais pas si c'était douloureux pour lui."],collectible:true,respawnDelay:ORGANIQUE_RESPAWN_MS,visible:true,unlockedBy:null},
      {id:'hs-reflet',type:'souffle',x:30,y:55,w:20,h:15,cursor:'eye',resource:{type:'souffle',amount:1},collectMode:'click',texts:["La roche réfléchit quelque chose qui n'est pas là.","Tu t'es souvenu de quelque chose. Tu ne sais plus quoi."],collectible:true,souffleUnique:true,visible:true,unlockedBy:null},
      {id:'hs-mur',type:'douleur',x:5,y:20,w:10,h:70,cursor:'hand',collectMode:'hold',holdMax:3000,holdTiers:[{ms:1000,resource:{type:'douleur',amount:1},text:"La pierre absorbe."},{ms:2000,resource:{type:'douleur',amount:1},text:"Tu presses plus fort."},{ms:3000,resource:{type:'douleur',amount:1},text:"Il ne reste pas de trace. Mais tu sais.",painDelta:0.05}],collectible:false,visible:true,unlockedBy:null},
      {id:'hs-alchimie-2',type:'alchimie',x:42,y:75,w:16,h:10,cursor:'flame',resource:null,collectMode:'click',texts:[],action:'open-alchemy',collectible:false,visible:true,unlockedBy:null},
    ],exits:[{id:'exit-gauche',targetScene:'scene-01',x:0,y:15,w:10,h:80,locked:false,lockedText:null,unlockedBy:null}]},
};

// ══════════════════════════════════════
// DOM REFS
// ══════════════════════════════════════
const $=id=>document.getElementById(id);
const hotspotLayer=$('hotspot-layer');
const dialogueEl=$('dialogue');
const dialogueText=$('dialogue-text');
const dialogueArrow=$('dialogue-arrow');
const alchemyMsg=$('alchemy-msg');
const recipeListEl=$('recipe-list');
const vitalityBar=$('vitality-bar');
let activeAlchemyPoint=false;

// ══════════════════════════════════════
// UI RENDERING
// ══════════════════════════════════════
const GLITCHS='░▒▓█▄▀■□▪▫';
function glitchText(t){if(state.vitality>2)return t;return t.split('').map(c=>Math.random()<0.12?GLITCHS[Math.floor(Math.random()*GLITCHS.length)]:c).join('')}

function updateResourceUI(){
  ['douleur','souffle','organique'].forEach(key=>{
    const s=key==='douleur'?'d':key==='souffle'?'s':'o';
    const val=state.inventory[key],cap=CAPS[key];
    const cont=$('shapes-'+s);cont.innerHTML='';
    for(let i=0;i<cap;i++){const d=document.createElement('span');d.className='res-shape'+(i>=val?' empty':'');d.style.color=RES_COLORS[key];d.textContent=RES_CHARS[key];cont.appendChild(d)}
    $('num-'+s).textContent=val+'/'+cap;
    $('res-'+s).classList.toggle('cap',val>=cap);
    $('res-'+s).querySelector('.res-label').textContent=glitchText(s.toUpperCase());
  });
}
function updateVitalityUI(){
  vitalityBar.innerHTML='';
  const offsets=[0,1,0,2,0,1,0,2,1,0];
  for(let i=0;i<state.vitalityMax;i++){
    const d=document.createElement('span');d.className='vit-dash';
    d.textContent='—';
    d.style.marginTop=offsets[i]+'px';
    d.style.marginRight=(1+Math.floor(Math.random()*2))+'px';
    if(i<state.vitality){d.classList.add('full');if(state.vitality<=2){d.classList.add('low');d.style.animationDelay=(i*0.1)+'s'}}
    vitalityBar.appendChild(d);
  }
}
function updateRecipeUI(){
  recipeListEl.innerHTML='';const onAlch=activeAlchemyPoint;
  RECIPES.forEach(r=>{const canAfford=Object.entries(r.cost).every(([k,v])=>state.inventory[k]>=v);const done=state.crafted.includes(r.id);const can=canAfford&&onAlch&&!done;
    const div=document.createElement('div');div.className='recipe-item';
    div.innerHTML=`<div class="recipe-name">${done?'✓ ':''}${r.name}</div><div class="recipe-cost">${r.cost.douleur?`<span style="color:var(--col-d)">D×${r.cost.douleur}</span>`:''} ${r.cost.souffle?`<span style="color:var(--col-s)">S×${r.cost.souffle}</span>`:''} ${r.cost.organique?`<span style="color:var(--col-o)">O×${r.cost.organique}</span>`:''}</div><button class="recipe-btn" ${can?'':'disabled'}>${done?'accompli':'accomplir'}</button>`;
    if(can)div.querySelector('.recipe-btn').addEventListener('click',()=>craftRecipe(r));
    recipeListEl.appendChild(div);
    // Organic separator
    const sep=document.createElement('div');sep.className='recipe-sep';recipeListEl.appendChild(sep)});
  // Remove last separator
  const lastSep=recipeListEl.querySelector('.recipe-sep:last-child');if(lastSep)lastSep.remove();
  alchemyMsg.textContent=onAlch?'':'— trouve un point d\'invocation';alchemyMsg.style.display=onAlch?'none':'block';
}

// ══════════════════════════════════════
// DIALOGUE (scrambled typewriter)
// ══════════════════════════════════════
let typingTimer=null,dialogueFinished=false,dialogueFullText='';
function showDialogue(text){
  clearTyping();dialogueFullText=text;dialogueFinished=false;dialogueText.textContent='';
  dialogueArrow.classList.remove('visible');
  gsap.to(dialogueEl,{opacity:1,y:0,duration:0.3,ease:'power2.out'});dialogueEl.classList.add('visible');
  const chars=text.split('');let i=0;
  function typeNext(){if(i>=chars.length){dialogueFinished=true;dialogueArrow.classList.add('visible');return}
    let ch=chars[i];if(state.vitality<=1&&Math.random()<0.125){const sp=document.createElement('span');sp.className='corrupt';sp.textContent=GLITCHS[Math.floor(Math.random()*GLITCHS.length)];dialogueText.appendChild(sp)}
    else dialogueText.appendChild(document.createTextNode(ch));i++;
    typingTimer=setTimeout(typeNext,15+Math.random()*25+(ch==='.'||ch==='—'?120:0))}
  typeNext();
}
function clearTyping(){if(typingTimer){clearTimeout(typingTimer);typingTimer=null}}
function closeDialogue(){if(!dialogueFinished){clearTyping();dialogueText.textContent=dialogueFullText;dialogueFinished=true;dialogueArrow.classList.add('visible');return}gsap.to(dialogueEl,{opacity:0,y:10,duration:0.2});dialogueEl.classList.remove('visible');dialogueFinished=false}
dialogueEl.addEventListener('click',e=>{e.stopPropagation();closeDialogue()});

// ══════════════════════════════════════
// FLOAT + FLASH
// ══════════════════════════════════════
function floatText(x,y,text,color){const el=document.createElement('div');el.className='float-text';el.textContent=text;el.style.color=color;el.style.left=(x/100*SCENE_W)+'px';el.style.top=(y/100*SCENE_H)+'px';hotspotLayer.appendChild(el);gsap.fromTo(el,{y:0,opacity:1},{y:-40,opacity:0,duration:1,ease:'expo.out',onComplete:()=>el.remove()})}
function flashPain(){const f=document.createElement('div');f.style.cssText='position:absolute;inset:0;background:var(--crimson);pointer-events:none;z-index:20;opacity:0';hotspotLayer.appendChild(f);gsap.fromTo(f,{opacity:0.35},{opacity:0,duration:0.3,ease:'power4.in',onComplete:()=>f.remove()})}

// ══════════════════════════════════════
// RESOURCE + VITALITY + CRAFT
// ══════════════════════════════════════
function collectResource(type,amount,hx,hy){if(state.inventory[type]>=CAPS[type]){if(type==='douleur')showDialogue("Tu ne peux pas porter plus que ça.");return false}const actual=Math.min(amount,CAPS[type]-state.inventory[type]);state.inventory[type]+=actual;if(type==='douleur'){loseVitality(actual);flashPain()}floatText(hx+2,hy-5,'+'+actual,RES_COLORS[type]);updateResourceUI();saveState();return true}
function loseVitality(n){state.vitality=Math.max(0,state.vitality-n);updateVitalityUI();saveState();if(state.vitality<state.vitalityMax)startPixelFlicker();if(state.vitality===0)triggerDeath()}
function triggerDeath(){stopPixelFlicker();const ov=document.createElement('div');ov.style.cssText='position:absolute;inset:0;background:#000;opacity:0;z-index:50;pointer-events:none';hotspotLayer.parentElement.appendChild(ov);gsap.to(ov,{opacity:1,duration:3,ease:'power2.in'});setTimeout(()=>showDialogue("Tu t'es dissous avant d'avoir compris."),1500);setTimeout(()=>{resetState();ov.remove();loadScene(state.currentScene)},5000)}
function craftRecipe(r){for(const[k,v]of Object.entries(r.cost))state.inventory[k]-=v;state.crafted.push(r.id);if(r.mechanic==='reveal-hotspots'||r.mechanic==='unlock-narrative')revealConditionalHotspots(r.id);else if(r.mechanic==='pain-absorb')state.painAbsorbActive=true;else if(r.mechanic==='unlock-exit'){const scene=SCENES[state.currentScene];const exit=scene.exits.find(e=>e.id===r.targetExit);if(exit){state.exits[exit.id]=true;renderExits(scene)}}showDialogue(r.sceneReaction);updateResourceUI();updateRecipeUI();saveState()}
function revealConditionalHotspots(rid){SCENES[state.currentScene].hotspots.forEach(hs=>{if(hs.unlockedBy===rid){const el=document.getElementById('hs-el-'+hs.id);if(el){el.style.display='block';gsap.fromTo(el,{opacity:0},{opacity:1,duration:1.5,ease:'expo.out'})}}})}

// ══════════════════════════════════════
// HOLD
// ══════════════════════════════════════
let holdTimer=null,holdStart=0,holdHs=null,holdTierIndex=0,holdBarEl=null;
function startHold(hs,el){holdHs=hs;holdStart=Date.now();holdTierIndex=0;holdBarEl=document.createElement('div');holdBarEl.className='hold-bar';holdBarEl.innerHTML='<div class="hold-bar-fill"></div>';el.appendChild(holdBarEl);holdTimer=setInterval(()=>{const elapsed=Date.now()-holdStart;const pct=Math.min(elapsed/hs.holdMax*100,100);holdBarEl.querySelector('.hold-bar-fill').style.width=pct+'%';while(holdTierIndex<hs.holdTiers.length&&elapsed>=hs.holdTiers[holdTierIndex].ms){const tier=hs.holdTiers[holdTierIndex];if(tier.resource)collectResource(tier.resource.type,tier.resource.amount,hs.x,hs.y);if(tier.text)showDialogue(tier.text);if(tier.painDelta){state.painLevel=Math.min(1,state.painLevel+tier.painDelta);saveState()}holdTierIndex++}if(elapsed>=hs.holdMax)endHold()},50)}
function endHold(){if(holdTimer){clearInterval(holdTimer);holdTimer=null}if(holdBarEl){holdBarEl.remove();holdBarEl=null}holdHs=null}

// ══════════════════════════════════════
// DECAY
// ══════════════════════════════════════
let decayTimer=null;
function startDecayTimer(){stopDecayTimer();decayTimer=setInterval(()=>{if(state.inventory.organique>ORGANIQUE_SAFE){state.inventory.organique--;if(!state.narrativeFlags['decay-warning']){showDialogue("Ça ne se conserve pas. Tu aurais dû t'en douter.");state.narrativeFlags['decay-warning']=true}updateResourceUI();saveState()}},ORGANIQUE_DECAY_MS)}
function stopDecayTimer(){if(decayTimer){clearInterval(decayTimer);decayTimer=null}}

// ══════════════════════════════════════
// SCENE TRANSITION (noise dissolve)
// ══════════════════════════════════════
function transitionToScene(tid){const ov=document.createElement('canvas');ov.style.cssText='position:absolute;inset:0;z-index:45;pointer-events:none';ov.width=960;ov.height=720;hotspotLayer.parentElement.appendChild(ov);const ctx=ov.getContext('2d');let p=0;const dissolve=()=>{p+=0.03;ctx.clearRect(0,0,ov.width,ov.height);for(let x=0;x<ov.width;x+=4){for(let y=0;y<ov.height;y+=4){if(Math.sin(x*0.05)*Math.cos(y*0.07)+Math.random()*0.3<p){ctx.fillStyle=Math.random()>0.5?'#8C1C1C':'#080506';ctx.fillRect(x,y,4,4)}}}if(p<1.2)requestAnimationFrame(dissolve);else{loadScene(tid);let r=1.2;const reveal=()=>{r-=0.04;ctx.clearRect(0,0,ov.width,ov.height);for(let x=0;x<ov.width;x+=4){for(let y=0;y<ov.height;y+=4){if(Math.sin(x*0.05)*Math.cos(y*0.07)+Math.random()*0.3<r){ctx.fillStyle=Math.random()>0.5?'#8C1C1C':'#080506';ctx.fillRect(x,y,4,4)}}}if(r>0)requestAnimationFrame(reveal);else ov.remove()};requestAnimationFrame(reveal)}};requestAnimationFrame(dissolve)}

// ══════════════════════════════════════
// SCENE LOADING
// ══════════════════════════════════════
function loadScene(sceneId){
  const scene=SCENES[sceneId];if(!scene)return;state.currentScene=sceneId;activeAlchemyPoint=false;
  setupPixiScene(scene.bg);
  hotspotLayer.querySelectorAll('.hotspot,.exit-zone').forEach(e=>e.remove());
  scene.hotspots.forEach(hs=>{const key=sceneId+':'+hs.id;
    if(hs.collectible&&hs.type==='souffle'&&state.souffleCollected[key])return;
    if(hs.collectible&&state.inspected[key]&&hs.type!=='organique')return;
    if(hs.collectible&&hs.type==='organique'&&state.organicRespawn[key]){if(Date.now()-state.organicRespawn[key]<(hs.respawnDelay||ORGANIQUE_RESPAWN_MS))return;else delete state.organicRespawn[key]}
    const isVisible=hs.visible||(hs.unlockedBy&&state.crafted.includes(hs.unlockedBy));
    const el=createHotspotEl(hs,sceneId);if(!isVisible)el.style.display='none';
  });
  renderExits(scene);
  if(!state.narrativeFlags['intro-'+sceneId]){setTimeout(()=>{showDialogue(scene.intro);state.narrativeFlags['intro-'+sceneId]=true;saveState()},600)}
  updateResourceUI();updateVitalityUI();updateRecipeUI();saveState();
}
const SCENE_W=960,SCENE_H=720;
function createHotspotEl(hs,sceneId){const el=document.createElement('button');el.className='hotspot';el.id='hs-el-'+hs.id;el.style.cssText=`left:${hs.x/100*SCENE_W}px;top:${hs.y/100*SCENE_H}px;width:${hs.w/100*SCENE_W}px;height:${hs.h/100*SCENE_H}px`;el.addEventListener('mouseenter',()=>setCursor(hs.cursor||'eye'));el.addEventListener('mouseleave',()=>setCursor('default'));if(hs.collectMode==='hold'){el.addEventListener('mousedown',e=>{e.preventDefault();startHold(hs,el)});el.addEventListener('mouseup',()=>endHold());el.addEventListener('mouseleave',()=>endHold())}else el.addEventListener('click',()=>handleHotspotClick(hs,el,sceneId));hotspotLayer.appendChild(el);return el}
function handleHotspotClick(hs,el,sceneId){if(hs.action==='open-alchemy'){activeAlchemyPoint=true;updateRecipeUI();showDialogue("Le cercle attend.");return}if(hs.texts&&hs.texts.length)showDialogue(hs.texts[Math.floor(Math.random()*hs.texts.length)]);if(hs.resource){const ok=collectResource(hs.resource.type,hs.resource.amount,hs.x+hs.w/2,hs.y+hs.h/2);if(!ok)return;if(hs.flashOnCollect)flashPain();const key=sceneId+':'+hs.id;if(hs.collectible){state.inspected[key]=true;if(hs.souffleUnique)state.souffleCollected[key]=true;if(hs.type==='organique')state.organicRespawn[key]=Date.now();gsap.to(el,{opacity:0,scale:hs.type==='souffle'?1:0.6,duration:0.4,ease:'expo.out',onComplete:()=>el.remove()})}saveState()}if(!hs.resource&&hs.type==='inspect'){state.inspected[sceneId+':'+hs.id]=true;saveState()}}
function renderExits(scene){hotspotLayer.querySelectorAll('.exit-zone').forEach(e=>e.remove());scene.exits.forEach(exit=>{const el=document.createElement('button');el.className='exit-zone';el.style.cssText=`left:${exit.x/100*SCENE_W}px;top:${exit.y/100*SCENE_H}px;width:${exit.w/100*SCENE_W}px;height:${exit.h/100*SCENE_H}px`;const isLocked=exit.locked&&!state.exits[exit.id]&&!(exit.unlockedBy&&state.crafted.includes(exit.unlockedBy));if(isLocked){el.classList.add('locked');el.addEventListener('mouseenter',()=>setCursor('locked'));el.addEventListener('click',()=>showDialogue(exit.lockedText))}else{el.addEventListener('mouseenter',()=>setCursor('exit'));el.addEventListener('click',()=>transitionToScene(exit.targetScene))}el.addEventListener('mouseleave',()=>setCursor('default'));hotspotLayer.appendChild(el)})}

// RESET
$('btn-reset').addEventListener('click',()=>{localStorage.removeItem(SAVE_KEY);state=JSON.parse(JSON.stringify(DEFAULT_STATE));loadScene('scene-01')});

// VOIR
$('btn-voir').addEventListener('click',()=>{hotspotLayer.querySelectorAll('.hotspot').forEach(el=>{el.style.background='rgba(140,28,28,0.15)';el.style.borderColor='rgba(190,55,45,0.5)'});setTimeout(()=>hotspotLayer.querySelectorAll('.hotspot').forEach(el=>{el.style.background='';el.style.borderColor=''}),3000)});

// ══════════════════════════════════════
// ══════════════════════════════════════
// SCALE TO FIT
// ══════════════════════════════════════
function scaleGame(){
  const game=document.getElementById('game');
  const sx=window.innerWidth/1280;
  const sy=window.innerHeight/720;
  const s=Math.min(sx,sy);
  game.style.transform=`scale(${s})`;
  game.style.transformOrigin='top left';
  game.style.position='absolute';
  game.style.left=`${(window.innerWidth-1280*s)/2}px`;
  game.style.top=`${(window.innerHeight-720*s)/2}px`;
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
drawPortrait();drawPanels();
window.addEventListener('resize',()=>{scaleGame();drawPanels()});
scaleGame();
startDecayTimer();loadScene(state.currentScene);
</script>
