<style>
:root {
  --bg: #000000; --bg2: #000000;
  --red: #FF0000; --amber: #FFAA00; --white: #FFFFFF; --grey: #666666;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Press Start 2P',monospace; color:var(--amber); cursor:none; user-select:none; display:flex; align-items:center; justify-content:center; min-height:100vh;
  -webkit-font-smoothing:none; -moz-osx-font-smoothing:unset; font-smooth:never; }

/* ── LAYOUT ── */
#game { position:relative; width:1280px; height:720px; background:#000; overflow:hidden; }

/* ── SCANLINES (seul effet autorisé) ── */
#game::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 3px); pointer-events:none; z-index:999; }

/* ── PANELS ── */
.panel { position:absolute; top:0; width:160px; height:720px; background:#000; border:none; }
#panel-left { left:0; border-right:1px solid var(--grey); }
#panel-right { right:0; border-left:1px solid var(--grey); }
.panel-canvas { display:none; }
.panel-content { position:relative; padding:12px 10px; display:flex; flex-direction:column; gap:8px; height:100%; }
.panel-title { font-size:8px; color:var(--red); text-transform:uppercase; padding-bottom:6px; letter-spacing:0.1em; }

/* ── RESOURCES — block characters ── */
.res-row { display:flex; align-items:center; gap:4px; padding:2px 0; font-size:8px; line-height:1; }
.res-label { width:12px; }
.res-shapes { letter-spacing:1px; }
.res-num { margin-left:auto; color:var(--grey); font-size:7px; }
.res-row.cap .res-num { animation:blink-hard 1s step-start infinite; }
@keyframes blink-hard { 0%,100%{visibility:visible} 50%{visibility:hidden} }

/* ── VITALITY ── */
#vitality-bar { margin-top:12px; padding-top:8px; border-top:1px solid #333; font-size:8px; letter-spacing:1px; line-height:1; }
.vit-dash { color:#330000; }
.vit-dash.full { color:var(--red); }
.vit-dash.low { animation:blink-hard 0.5s step-start infinite; }

/* ── BUTTONS ── */
.btn-dos { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--amber); background:#000; border:none; padding:2px 0; cursor:none; text-align:left; }
.btn-dos:hover { color:#000; background:var(--amber); }
.btn-dos:disabled { color:#333; background:#000; }

#btn-reset { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--grey); background:#000; border:none; padding:2px 0; cursor:none; margin-top:auto; }
#btn-reset:hover { color:#000; background:var(--grey); }

#btn-voir { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--amber); background:#000; border:none; padding:2px 0; cursor:none; }
#btn-voir:hover { color:#000; background:var(--amber); }

/* ── RECIPES ── */
.recipe-item { padding:4px 0; }
.recipe-sep { font-size:7px; color:#333; padding:2px 0; }
.recipe-name { font-size:8px; color:var(--white); margin-bottom:3px; line-height:1.4; }
.recipe-cost { font-size:7px; color:var(--amber); margin-bottom:4px; }
.recipe-cost span { margin-right:4px; }
.recipe-btn { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--amber); background:#000; border:none; padding:1px 0; cursor:none; }
.recipe-btn:hover:not(:disabled) { color:#000; background:var(--amber); }
.recipe-btn:disabled { color:#333; }
#alchemy-msg { font-size:6px; color:var(--grey); margin-top:auto; line-height:1.8; }

/* ── SCENE ── */
#scene-wrapper { position:absolute; left:160px; top:0; width:960px; height:720px; background:#000; overflow:hidden; }
#pixi-container { position:absolute; inset:0; width:960px; height:720px; }

/* ── HOTSPOTS ── */
#hotspot-layer { position:absolute; inset:0; z-index:10; }
.hotspot { position:absolute; background:transparent; border:1px dashed #FF000044; cursor:none; padding:0; }
.hotspot:hover { background:#FF000011; }
.hotspot.zoom-hs { border:none; }
.hotspot.zoom-hs:hover { background:#FF000008; }
.exit-zone { position:absolute; z-index:6; cursor:none; background:transparent; border:none; padding:0; }

/* Hold bar */
.hold-bar { position:absolute; bottom:-4px; left:10px; right:10px; height:2px; background:#333; }
.hold-bar-fill { height:100%; width:0%; background:var(--red); }

/* Float text */
.float-text { position:absolute; font-family:'Press Start 2P',monospace; font-size:10px; pointer-events:none; z-index:30; }

/* ── DIALOGUE — ASCII box ── */
#dialogue { position:absolute; bottom:40px; left:50%; transform:translateX(-50%); width:640px; background:#000; border:1px solid var(--amber); display:none; flex-direction:column; padding:12px 16px; z-index:40; }
#dialogue.visible { display:flex; }
#portrait { display:none; }
#portrait canvas { display:none; }
#portrait-label { display:none; }
#dialogue-content { display:flex; flex-direction:column; }
#dialogue-text { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--amber); line-height:2.2; }
#dialogue-text .corrupt { color:var(--red); }
#dialogue-arrow { font-size:8px; color:var(--amber); margin-top:6px; text-align:right; display:none; }
#dialogue-arrow.visible { display:block; animation:blink-hard 0.5s step-start infinite; }

/* ── CURSOR ── */
#cursor { position:fixed; pointer-events:none; z-index:1000; transform:translate(-50%,-50%); }
#cursor svg { width:20px; height:20px; fill:none; stroke:var(--amber); stroke-width:1.5; }
</style>

<script>
// ══════════════════════════════════════
// ORGANIC PANEL BACKGROUNDS
// ══════════════════════════════════════
function drawPanelBg(canvasId) {
  const canvas = document.getElementById(canvasId);
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // Base fill
  ctx.fillStyle = '#100b0a';
  ctx.fillRect(0, 0, w, h);

  // Big chunky pixel grain — 4x4 blocks like the scene
  const imgData = ctx.getImageData(0, 0, w, h);
  const blockSize = 4;
  for (let by = 0; by < h; by += blockSize) {
    for (let bx = 0; bx < w; bx += blockSize) {
      const noise = (Math.random() - 0.5) * 20;
      const tint = Math.random() < 0.03 ? 8 + Math.random() * 12 : 0; // rare crimson speck
      for (let dy = 0; dy < blockSize && by+dy < h; dy++) {
        for (let dx = 0; dx < blockSize && bx+dx < w; dx++) {
          const i = ((by+dy) * w + (bx+dx)) * 4;
          imgData.data[i]   += noise + tint;
          imgData.data[i+1] += noise;
          imgData.data[i+2] += noise;
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function drawPanels() {
  drawPanelBg('panel-left-bg');
  drawPanelBg('panel-right-bg');
}

// ══════════════════════════════════════
// PIXI.JS SCENE
// ══════════════════════════════════════
const pixiContainer = document.getElementById('pixi-container');
const app = new PIXI.Application({
  width: 960,
  height: 720,
  backgroundAlpha: 0,
  antialias: false,
});
pixiContainer.insertBefore(app.view, pixiContainer.firstChild);
app.view.style.position = 'absolute';
app.view.style.inset = '0';
app.view.style.width = '100%';
app.view.style.height = '100%';
app.view.style.zIndex = '0';

let sceneSprite = null;

function setupPixiScene(imagePath, sceneId) {
  if (sceneSprite) { app.stage.removeChild(sceneSprite); sceneSprite.destroy(); }

  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = 960; c.height = 720;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, 960, 720);

    // Draw scene elements on top
    if (sceneId === 'scene-01') {
      drawRocherOnScene(ctx);
      drawTraceOnScene(ctx);
      drawAlchemyCircleOnScene(ctx);
    }

    const tex = PIXI.Texture.from(c);
    sceneSprite = new PIXI.Sprite(tex);
    sceneSprite.width = 960; sceneSprite.height = 720;
    app.stage.addChildAt(sceneSprite, 0);
  };
  img.src = imagePath;
}

// ── Rock on scene (small, at hotspot position) ──
function drawRocherOnScene(ctx) {
  const ox = 960 * 0.20, oy = 720 * 0.45; // hotspot origin
  const w = 960 * 0.18, h = 720 * 0.25;
  ctx.save();
  ctx.translate(ox, oy);
  // Shadow
  ctx.beginPath();
  ctx.ellipse(w*0.5, h*0.9, w*0.4, h*0.08, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();
  // Rock body — irregular shape
  ctx.beginPath();
  ctx.moveTo(w*0.15, h*0.85);
  ctx.bezierCurveTo(w*0.05, h*0.55, w*0.2, h*0.2, w*0.4, h*0.1);
  ctx.bezierCurveTo(w*0.55, h*0.05, w*0.75, h*0.15, w*0.85, h*0.35);
  ctx.bezierCurveTo(w*0.95, h*0.55, w*0.88, h*0.75, w*0.82, h*0.85);
  ctx.closePath();
  ctx.fillStyle = '#1e1412';
  ctx.fill();
  // Lighter face
  ctx.beginPath();
  ctx.moveTo(w*0.25, h*0.7);
  ctx.bezierCurveTo(w*0.2, h*0.4, w*0.35, h*0.2, w*0.5, h*0.15);
  ctx.bezierCurveTo(w*0.6, h*0.12, w*0.7, h*0.2, w*0.72, h*0.35);
  ctx.lineTo(w*0.65, h*0.7);
  ctx.closePath();
  ctx.fillStyle = '#2a1c18';
  ctx.fill();
  // Edge highlight
  ctx.beginPath();
  ctx.moveTo(w*0.3, h*0.35);
  ctx.bezierCurveTo(w*0.4, h*0.15, w*0.6, h*0.12, w*0.7, h*0.25);
  ctx.strokeStyle = '#3a2c24';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Crack
  ctx.beginPath();
  ctx.moveTo(w*0.5, h*0.25); ctx.lineTo(w*0.48, h*0.45); ctx.lineTo(w*0.52, h*0.6);
  ctx.strokeStyle = '#0c0806';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.restore();
}

// ── Body trace on scene (silhouette in sand) ──
function drawTraceOnScene(ctx) {
  const ox = 960 * 0.45, oy = 720 * 0.65;
  const w = 960 * 0.25, h = 720 * 0.15;
  ctx.save();
  ctx.translate(ox + w*0.5, oy + h*0.5);
  ctx.globalAlpha = 0.25;
  // Lying figure — simple silhouette pressed into sand
  ctx.fillStyle = '#0a0504';
  // Head
  ctx.beginPath();
  ctx.ellipse(-w*0.35, 0, h*0.25, h*0.22, 0, 0, Math.PI*2);
  ctx.fill();
  // Torso
  ctx.beginPath();
  ctx.ellipse(-w*0.1, 0, h*0.55, h*0.3, 0.05, 0, Math.PI*2);
  ctx.fill();
  // Legs
  ctx.beginPath();
  ctx.ellipse(w*0.25, -h*0.08, h*0.45, h*0.15, -0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w*0.25, h*0.12, h*0.45, h*0.15, 0.1, 0, Math.PI*2);
  ctx.fill();
  // Arms
  ctx.beginPath();
  ctx.ellipse(-w*0.15, -h*0.35, h*0.35, h*0.1, -0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-w*0.1, h*0.35, h*0.3, h*0.1, 0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── Alchemy circle on scene ──
function drawAlchemyCircleOnScene(ctx) {
  const cx = 960 * 0.75, cy = 720 * 0.76;
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.strokeStyle = '#8C1C1C';
  ctx.lineWidth = 1;
  // Outer circle
  ctx.beginPath();
  ctx.ellipse(cx, cy, 35, 20, 0.1, 0, Math.PI*2);
  ctx.stroke();
  // Inner circle
  ctx.beginPath();
  ctx.ellipse(cx, cy, 18, 10, -0.05, 0, Math.PI*2);
  ctx.stroke();
  // Cross lines
  ctx.beginPath();
  ctx.moveTo(cx-30, cy); ctx.lineTo(cx+30, cy);
  ctx.moveTo(cx, cy-18); ctx.lineTo(cx, cy+18);
  ctx.strokeStyle = '#6B2416';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ══════════════════════════════════════
// LOW VITALITY FX — lightweight, no GPU filters
// ══════════════════════════════════════
let pixelFlickerTimer = null;

function startPixelFlicker() {
  if (pixelFlickerTimer) return;
  const layer = document.getElementById('hotspot-layer');
  pixelFlickerTimer = setInterval(() => {
    if (!state || state.vitality >= 5) return; // only below 50%
    const count = Math.max(1, Math.floor((1 - state.vitality / state.vitalityMax) * 12));
    for (let i = 0; i < count; i++) {
      const px = document.createElement('div');
      const size = 4 + Math.floor(Math.random() * 12);
      px.style.cssText = `position:absolute;left:${Math.random()*920}px;top:${Math.random()*680}px;width:${size}px;height:${size}px;background:#000;pointer-events:none;z-index:15;`;
      layer.appendChild(px);
      setTimeout(() => px.remove(), 80 + Math.random() * 150);
    }
  }, 2000 + Math.random() * 2000);
}

function stopPixelFlicker() {
  if (pixelFlickerTimer) { clearInterval(pixelFlickerTimer); pixelFlickerTimer = null; }
}
// ══════════════════════════════════════
// SVG RESOURCE SHAPES
// ══════════════════════════════════════
const RES_CHARS = { douleur:'█', souffle:'█', organique:'█' };
const RES_EMPTY = '░';
const RES_COLORS = { douleur:'var(--red)', souffle:'var(--amber)', organique:'var(--amber)' };

// ══════════════════════════════════════
// CURSOR (animated SVG)
// ══════════════════════════════════════
const cursorEl = document.getElementById('cursor');
const cursorSvg = document.getElementById('cursor-svg');
let cursorType = 'default';
let cursorTween = null;

function setCursor(type) {
  if (type === cursorType) return;
  cursorType = type;
  const svg = cursorSvg;
  svg.style.stroke = type==='hand'?'#FF0000':type==='flame'?'#FF0000':type==='exit'?'#FFAA00':type==='locked'?'#333':'#FFAA00';
}

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

// ══════════════════════════════════════
// PORTRAIT
// ══════════════════════════════════════
function drawPortrait() {
  const canvas = document.querySelector('#portrait canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#080506';
  ctx.fillRect(0, 0, 16, 16);
  // Imperfect 6-pointed star — two offset triangles
  ctx.fillStyle = '#3A3230';
  ctx.beginPath(); ctx.moveTo(8,2); ctx.lineTo(13,11); ctx.lineTo(3,11); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(7,14); ctx.lineTo(2,6); ctx.lineTo(13,6); ctx.closePath(); ctx.fill();
  // Crimson edges
  ctx.strokeStyle = '#8C1C1C'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(8,2); ctx.lineTo(13,11); ctx.lineTo(3,11); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,14); ctx.lineTo(2,6); ctx.lineTo(13,6); ctx.closePath(); ctx.stroke();
}

// No GPU ticker — all FX are lightweight DOM-based

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const SAVE_KEY = 'desert-cramoisi-state';
const CAPS = { douleur:5, souffle:4, organique:6 };
const ORGANIQUE_SAFE = 5;
const ORGANIQUE_DECAY_MS = 120000;
const ORGANIQUE_RESPAWN_MS = 480000;
const DEFAULT_STATE = {
  currentScene:'scene-01', inventory:{douleur:0,souffle:0,organique:0},
  vitality:10, vitalityMax:10, painLevel:0.0, crafted:[], inspected:{},
  exits:{}, souffleCollected:{}, organicRespawn:{},
  organicDecayStart:null, painAbsorbActive:false, narrativeFlags:{},
};
let state = loadState();
function loadState(){try{const s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s&&s.inventory)return s}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_STATE))}
function saveState(){localStorage.setItem(SAVE_KEY,JSON.stringify(state))}
function resetState(){const k={painLevel:state.painLevel,narrativeFlags:{...state.narrativeFlags}};state=JSON.parse(JSON.stringify(DEFAULT_STATE));state.painLevel=k.painLevel;state.narrativeFlags=k.narrativeFlags;saveState()}

// ══════════════════════════════════════
// RECIPES
// ══════════════════════════════════════
const RECIPES = [
  {id:'armure-peau',name:"Armure de peau",cost:{douleur:1,souffle:0,organique:0},effect:"Te protège du froid.",sceneReaction:"Quelque chose enveloppe ce qui reste de toi. Tu as moins froid.",mechanic:'pain-absorb'},
];

let rocherBloodied = false;

function drawRocher(ctx, w, h, bloodied) {
  ctx.fillStyle='#080506';ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#1a0c0b';ctx.fillRect(0,h*0.7,w,h*0.3);
  ctx.beginPath();ctx.moveTo(w*0.2,h*0.7);
  ctx.bezierCurveTo(w*0.15,h*0.4,w*0.3,h*0.2,w*0.45,h*0.18);
  ctx.bezierCurveTo(w*0.55,h*0.16,w*0.7,h*0.25,w*0.75,h*0.35);
  ctx.bezierCurveTo(w*0.82,h*0.5,w*0.78,h*0.65,w*0.8,h*0.7);
  ctx.closePath();ctx.fillStyle='#2a1a16';ctx.fill();
  ctx.strokeStyle='#3a2a24';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.moveTo(w*0.3,h*0.45);
  ctx.bezierCurveTo(w*0.4,h*0.28,w*0.55,h*0.22,w*0.65,h*0.3);
  ctx.strokeStyle='#4a3a30';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.moveTo(w*0.45,h*0.35);ctx.lineTo(w*0.48,h*0.5);ctx.lineTo(w*0.44,h*0.6);
  ctx.strokeStyle='#1a0c0b';ctx.lineWidth=1;ctx.stroke();
  if(bloodied){for(let i=0;i<8;i++){const bx=w*0.3+Math.random()*w*0.4,by=h*0.25+Math.random()*h*0.3,br=5+Math.random()*15;const g=ctx.createRadialGradient(bx,by,0,bx,by,br);g.addColorStop(0,'rgba(140,28,28,0.7)');g.addColorStop(1,'rgba(140,28,28,0)');ctx.fillStyle=g;ctx.fillRect(bx-br,by-br,br*2,br*2)}
    ctx.beginPath();ctx.moveTo(w*0.5,h*0.3);ctx.bezierCurveTo(w*0.5,h*0.4,w*0.48,h*0.5,w*0.49,h*0.6);ctx.strokeStyle='#8C1C1C';ctx.lineWidth=2;ctx.stroke()}
  const id=ctx.getImageData(0,0,w,h);for(let i=0;i<id.data.length;i+=4){const n=(Math.random()-0.5)*10;id.data[i]+=n;id.data[i+1]+=n;id.data[i+2]+=n}ctx.putImageData(id,0,0);
}

function drawTrace(ctx, w, h) {
  ctx.fillStyle='#1a0c0b';ctx.fillRect(0,0,w,h);
  const g=ctx.createRadialGradient(w*0.5,h*0.45,0,w*0.5,h*0.45,w*0.4);g.addColorStop(0,'#251210');g.addColorStop(1,'#1a0c0b');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.save();ctx.translate(w*0.5,h*0.45);ctx.scale(1.2,1);ctx.fillStyle='#100808';
  ctx.beginPath();ctx.arc(0,-h*0.18,25,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(0,-h*0.02,40,70,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-55,h*0.02,12,50,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(50,-h*0.01,12,45,-0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-18,h*0.18,14,55,0.05,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(18,h*0.19,14,55,-0.05,0,Math.PI*2);ctx.fill();
  ctx.restore();
  const gl=ctx.createRadialGradient(w*0.5,h*0.45,50,w*0.5,h*0.45,180);gl.addColorStop(0,'rgba(140,28,28,0.04)');gl.addColorStop(1,'transparent');ctx.fillStyle=gl;ctx.fillRect(0,0,w,h);
  const id=ctx.getImageData(0,0,w,h);for(let i=0;i<id.data.length;i+=4){const n=(Math.random()-0.5)*8;id.data[i]+=n;id.data[i+1]+=n;id.data[i+2]+=n}ctx.putImageData(id,0,0);
}

const ZOOM_SCENES = {
  'rocher-zoom':{draw:drawRocher,introText:null,hotspots:[
    {id:'hs-smash',x:25,y:20,w:50,h:45,cursor:'hand',action:'smash-head',texts:["Tu écrases ta tête contre la pierre. Le son est mat.","Le rocher ne bronche pas. Toi si."]},

  });
  const ret=document.createElement('button');ret.className='exit-zone';
  ret.style.cssText=`left:0;top:${720*0.8}px;width:960px;height:${720*0.2}px`;
  ret.addEventListener('mouseenter',()=>setCursor('exit'));
  ret.addEventListener('mouseleave',()=>setCursor('default'));

}

let typingTimer=null,dialogueFinished=false,dialogueFullText='';
function showDialogue(text){
  clearTyping();dialogueFullText=text;dialogueFinished=false;dialogueText.textContent='';
  dialogueArrow.classList.remove('visible');
  dialogueEl.classList.add('visible');
  const chars=text.split('');let i=0;
  function typeNext(){if(i>=chars.length){dialogueFinished=true;dialogueArrow.classList.add('visible');return}
    let ch=chars[i];if(state.vitality<=1&&Math.random()<0.125){const sp=document.createElement('span');sp.className='corrupt';sp.textContent=GLITCHS[Math.floor(Math.random()*GLITCHS.length)];dialogueText.appendChild(sp)}
    else dialogueText.appendChild(document.createTextNode(ch));i++;
    typingTimer=setTimeout(typeNext,15+Math.random()*25+(ch==='.'||ch==='—'?120:0))}
  typeNext();
}
function clearTyping(){if(typingTimer){clearTimeout(typingTimer);typingTimer=null}}
function closeDialogue(){if(!dialogueFinished){clearTyping();dialogueText.textContent=dialogueFullText;dialogueFinished=true;dialogueArrow.classList.add('visible');return}dialogueEl.classList.remove('visible');dialogueFinished=false}

function floatText(x,y,text,color){const el=document.createElement('div');el.className='float-text';el.textContent=text;el.style.color=color;el.style.left=(x/100*SCENE_W)+'px';el.style.top=(y/100*SCENE_H)+'px';hotspotLayer.appendChild(el);gsap.fromTo(el,{y:0,opacity:1},{y:-40,opacity:0,duration:1,ease:'expo.out',onComplete:()=>el.remove()})}

// ══════════════════════════════════════
// RESOURCE + VITALITY + CRAFT
// ══════════════════════════════════════
function collectResource(type,amount,hx,hy){if(state.inventory[type]>=CAPS[type]){if(type==='douleur')showDialogue("Tu ne peux pas porter plus que ça.");return false}const actual=Math.min(amount,CAPS[type]-state.inventory[type]);state.inventory[type]+=actual;if(type==='douleur'){loseVitality(actual);flashPain()}floatText(hx+2,hy-5,'+'+actual,RES_COLORS[type]);updateResourceUI();saveState();return true}
function loseVitality(n){state.vitality=Math.max(0,state.vitality-n);updateVitalityUI();saveState();if(state.vitality<state.vitalityMax)startPixelFlicker();if(state.vitality===0)triggerDeath()}
function triggerDeath(){stopPixelFlicker();const ov=document.createElement('div');ov.style.cssText='position:absolute;inset:0;background:#000;opacity:0;z-index:50;pointer-events:none';hotspotLayer.parentElement.appendChild(ov);gsap.to(ov,{opacity:1,duration:3,ease:'power2.in'});setTimeout(()=>showDialogue("Tu t'es dissous avant d'avoir compris."),1500);setTimeout(()=>{resetState();ov.remove();loadScene(state.currentScene)},5000)}
function craftRecipe(r){for(const[k,v]of Object.entries(r.cost))state.inventory[k]-=v;state.crafted.push(r.id);if(r.mechanic==='reveal-hotspots'||r.mechanic==='unlock-narrative')revealConditionalHotspots(r.id);else if(r.mechanic==='pain-absorb')state.painAbsorbActive=true;else if(r.mechanic==='unlock-exit'){const scene=SCENES[state.currentScene];const exit=scene.exits.find(e=>e.id===r.targetExit);if(exit){state.exits[exit.id]=true;renderExits(scene)}}showDialogue(r.sceneReaction);updateResourceUI();updateRecipeUI();saveState()}
function revealConditionalHotspots(rid){SCENES[state.currentScene].hotspots.forEach(hs=>{if(hs.unlockedBy===rid){const el=document.getElementById('hs-el-'+hs.id);if(el){el.style.display='block';gsap.fromTo(el,{opacity:0},{opacity:1,duration:1.5,ease:'expo.out'})}}})}

let holdTimer=null,holdStart=0,holdHs=null,holdTierIndex=0,holdBarEl=null;
function startHold(hs,el){holdHs=hs;holdStart=Date.now();holdTierIndex=0;holdBarEl=document.createElement('div');holdBarEl.className='hold-bar';holdBarEl.innerHTML='<div class="hold-bar-fill"></div>';el.appendChild(holdBarEl);holdTimer=setInterval(()=>{const elapsed=Date.now()-holdStart;const pct=Math.min(elapsed/hs.holdMax*100,100);holdBarEl.querySelector('.hold-bar-fill').style.width=pct+'%';while(holdTierIndex<hs.holdTiers.length&&elapsed>=hs.holdTiers[holdTierIndex].ms){const tier=hs.holdTiers[holdTierIndex];if(tier.resource)collectResource(tier.resource.type,tier.resource.amount,hs.x,hs.y);if(tier.text)showDialogue(tier.text);if(tier.painDelta){state.painLevel=Math.min(1,state.painLevel+tier.painDelta);saveState()}holdTierIndex++}if(elapsed>=hs.holdMax)endHold()},50)}
function endHold(){if(holdTimer){clearInterval(holdTimer);holdTimer=null}if(holdBarEl){holdBarEl.remove();holdBarEl=null}holdHs=null}

// SCENE TRANSITION (noise dissolve)
// ══════════════════════════════════════
function transitionToScene(tid){const ov=document.createElement('canvas');ov.style.cssText='position:absolute;inset:0;z-index:45;pointer-events:none';ov.width=960;ov.height=720;hotspotLayer.parentElement.appendChild(ov);const ctx=ov.getContext('2d');let p=0;const dissolve=()=>{p+=0.03;ctx.clearRect(0,0,ov.width,ov.height);for(let x=0;x<ov.width;x+=4){for(let y=0;y<ov.height;y+=4){if(Math.sin(x*0.05)*Math.cos(y*0.07)+Math.random()*0.3<p){ctx.fillStyle=Math.random()>0.5?'#8C1C1C':'#080506';ctx.fillRect(x,y,4,4)}}}if(p<1.2)requestAnimationFrame(dissolve);else{loadScene(tid);let r=1.2;const reveal=()=>{r-=0.04;ctx.clearRect(0,0,ov.width,ov.height);for(let x=0;x<ov.width;x+=4){for(let y=0;y<ov.height;y+=4){if(Math.sin(x*0.05)*Math.cos(y*0.07)+Math.random()*0.3<r){ctx.fillStyle=Math.random()>0.5?'#8C1C1C':'#080506';ctx.fillRect(x,y,4,4)}}}if(r>0)requestAnimationFrame(reveal);else ov.remove()};requestAnimationFrame(reveal)}};requestAnimationFrame(dissolve)}

// ══════════════════════════════════════
// SCENE LOADING
// ══════════════════════════════════════
function loadScene(sceneId){
  const scene=SCENES[sceneId];if(!scene)return;state.currentScene=sceneId;activeAlchemyPoint=false;
  setupPixiScene(scene.bg, sceneId);
  hotspotLayer.querySelectorAll('.hotspot,.exit-zone').forEach(e=>e.remove());
  scene.hotspots.forEach(hs=>{const key=sceneId+':'+hs.id;
    if(hs.collectible&&hs.type==='souffle'&&state.souffleCollected[key])return;
    if(hs.collectible&&state.inspected[key]&&hs.type!=='organique')return;
    if(hs.collectible&&hs.type==='organique'&&state.organicRespawn[key]){if(Date.now()-state.organicRespawn[key]<(hs.respawnDelay||ORGANIQUE_RESPAWN_MS))return;else delete state.organicRespawn[key]}
    const isVisible=hs.visible||(hs.unlockedBy&&state.crafted.includes(hs.unlockedBy));
    const el=createHotspotEl(hs,sceneId);if(!isVisible)el.style.display='none';
  });
  renderExits(scene);
  if(!state.narrativeFlags['intro-'+sceneId]){setTimeout(()=>{showDialogue(scene.intro);state.narrativeFlags['intro-'+sceneId]=true;saveState()},600)}
  updateResourceUI();updateVitalityUI();updateRecipeUI();saveState();
}
const SCENE_W=960,SCENE_H=720;
function createHotspotEl(hs,sceneId){const el=document.createElement('button');el.className='hotspot'+(hs.type==='zoom'?' zoom-hs':'');el.id='hs-el-'+hs.id;el.style.cssText=`left:${hs.x/100*SCENE_W}px;top:${hs.y/100*SCENE_H}px;width:${hs.w/100*SCENE_W}px;height:${hs.h/100*SCENE_H}px`;el.addEventListener('mouseenter',()=>setCursor(hs.cursor||'eye'));el.addEventListener('mouseleave',()=>setCursor('default'));if(hs.collectMode==='hold'){el.addEventListener('mousedown',e=>{e.preventDefault();startHold(hs,el)});el.addEventListener('mouseup',()=>endHold());el.addEventListener('mouseleave',()=>endHold())}else el.addEventListener('click',()=>handleHotspotClick(hs,el,sceneId));hotspotLayer.appendChild(el);return el}
function handleHotspotClick(hs,el,sceneId){if(hs.type==='zoom'&&hs.zoomScene){enterZoom(hs.zoomScene);return}if(hs.action==='open-alchemy'){activeAlchemyPoint=true;updateRecipeUI();showDialogue("Le cercle attend.");return}if(hs.texts&&hs.texts.length)showDialogue(hs.texts[Math.floor(Math.random()*hs.texts.length)]);if(hs.resource){const ok=collectResource(hs.resource.type,hs.resource.amount,hs.x+hs.w/2,hs.y+hs.h/2);if(!ok)return;if(hs.flashOnCollect)flashPain();const key=sceneId+':'+hs.id;if(hs.collectible){state.inspected[key]=true;if(hs.souffleUnique)state.souffleCollected[key]=true;if(hs.type==='organique')state.organicRespawn[key]=Date.now();gsap.to(el,{opacity:0,scale:hs.type==='souffle'?1:0.6,duration:0.4,ease:'expo.out',onComplete:()=>el.remove()})}saveState()}if(!hs.resource&&hs.type==='inspect'){state.inspected[sceneId+':'+hs.id]=true;saveState()}}
function renderExits(scene){hotspotLayer.querySelectorAll('.exit-zone').forEach(e=>e.remove());scene.exits.forEach(exit=>{const el=document.createElement('button');el.className='exit-zone';el.style.cssText=`left:${exit.x/100*SCENE_W}px;top:${exit.y/100*SCENE_H}px;width:${exit.w/100*SCENE_W}px;height:${exit.h/100*SCENE_H}px`;const isLocked=exit.locked&&!state.exits[exit.id]&&!(exit.unlockedBy&&state.crafted.includes(exit.unlockedBy));if(isLocked){el.classList.add('locked');el.addEventListener('mouseenter',()=>setCursor('locked'));el.addEventListener('click',()=>showDialogue(exit.lockedText))}else if(exit.targetScene){el.addEventListener('mouseenter',()=>setCursor('exit'));el.addEventListener('click',()=>transitionToScene(exit.targetScene))}else{el.classList.add('locked');el.addEventListener('mouseenter',()=>setCursor('locked'));el.addEventListener('click',()=>showDialogue(exit.lockedText))}el.addEventListener('mouseleave',()=>setCursor('default'));hotspotLayer.appendChild(el)})}

function scaleGame(){
  const game=document.getElementById('game');
  const sx=window.innerWidth/1280;
  const sy=window.innerHeight/720;
  const s=Math.min(sx,sy);
  game.style.transform=`scale(${s})`;
  game.style.transformOrigin='top left';
  game.style.position='absolute';
  game.style.left=`${(window.innerWidth-1280*s)/2}px`;
  game.style.top=`${(window.innerHeight-720*s)/2}px`;
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
drawPortrait();
window.addEventListener('resize',()=>{scaleGame()});
scaleGame();
startDecayTimer();loadScene(state.currentScene);
</script>
