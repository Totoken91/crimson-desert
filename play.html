<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Désert Cramoisi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
:root {
  --bg: #000000; --bg2: #000000;
  --red: #FF0000; --amber: #FFAA00; --white: #FFFFFF; --grey: #666666;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Press Start 2P',monospace; color:var(--amber); cursor:none; user-select:none; display:flex; align-items:center; justify-content:center; min-height:100vh;
  -webkit-font-smoothing:none; -moz-osx-font-smoothing:unset; font-smooth:never; }

/* ── LAYOUT ── */
#game { position:relative; width:1280px; height:720px; background:#000; overflow:hidden; }

/* ── SCANLINES (seul effet autorisé) ── */
#game::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 3px); pointer-events:none; z-index:999; }

/* ── PANELS ── */
.panel { position:absolute; top:0; width:160px; height:720px; background:#000; border:none; }
#panel-left { left:0; border-right:1px solid var(--grey); }
#panel-right { right:0; border-left:1px solid var(--grey); }
.panel-canvas { display:none; }
.panel-content { position:relative; padding:12px 10px; display:flex; flex-direction:column; gap:8px; height:100%; }
.panel-title { font-size:8px; color:var(--red); text-transform:uppercase; padding-bottom:6px; letter-spacing:0.1em; }

/* ── RESOURCES — block characters ── */
.res-row { display:flex; align-items:center; gap:4px; padding:2px 0; font-size:8px; line-height:1; }
.res-label { width:12px; }
.res-shapes { letter-spacing:1px; }
.res-num { margin-left:auto; color:var(--grey); font-size:7px; }
.res-row.cap .res-num { animation:blink-hard 1s step-start infinite; }
@keyframes blink-hard { 0%,100%{visibility:visible} 50%{visibility:hidden} }

/* ── DECAY BAR (same style as vitality, yellow) ── */
#decay-bar { margin-top:4px; font-size:8px; letter-spacing:1px; line-height:1; }
.decay-dash { color:#886600; }
.decay-dash.full { color:#FFAA00; }
.decay-dash.low { animation:blink-hard 0.5s step-start infinite; }

/* ── VITALITY ── */
#vitality-bar { margin-top:12px; padding-top:8px; border-top:1px solid #333; font-size:8px; letter-spacing:1px; line-height:1; }
.vit-dash { color:#330000; }
.vit-dash.full { color:var(--red); }
.vit-dash.low { animation:blink-hard 0.5s step-start infinite; }

/* ── BUTTONS ── */
.btn-dos { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--amber); background:#000; border:none; padding:2px 0; cursor:none; text-align:left; }
.btn-dos:hover { color:#000; background:var(--amber); }
.btn-dos:disabled { color:#333; background:#000; }

#btn-reset { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--grey); background:#000; border:none; padding:2px 0; cursor:none; margin-top:auto; }
#btn-reset:hover { color:#000; background:var(--grey); }

#btn-voir { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--amber); background:#000; border:none; padding:2px 0; cursor:none; }
#btn-voir:hover { color:#000; background:var(--amber); }

/* ── RECIPES ── */
.recipe-item { padding:4px 0; }
.recipe-sep { font-size:7px; color:#333; padding:2px 0; }
.recipe-name { font-size:8px; color:var(--white); margin-bottom:3px; line-height:1.4; }
.recipe-cost { font-size:7px; color:var(--amber); margin-bottom:4px; }
.recipe-cost span { margin-right:4px; }
.recipe-btn { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--amber); background:#000; border:none; padding:1px 0; cursor:none; }
.recipe-btn:hover:not(:disabled) { color:#000; background:var(--amber); }
.recipe-btn:disabled { color:#333; }
#alchemy-msg { font-size:6px; color:var(--grey); margin-top:auto; line-height:1.8; }

/* ── SCENE ── */
#scene-wrapper { position:absolute; left:160px; top:0; width:960px; height:720px; background:#000; overflow:hidden; }
#pixi-container { position:absolute; inset:0; width:960px; height:720px; }

/* ── HOTSPOTS ── */
#hotspot-layer { position:absolute; inset:0; z-index:10; }
.hotspot { position:absolute; background:transparent; border:none; cursor:none; padding:0; }
.hotspot:hover { background:transparent; }
.hotspot.zoom-hs { border:none; }
.hotspot.zoom-hs:hover { background:transparent; }
.exit-zone { position:absolute; z-index:6; cursor:none; background:transparent; border:none; padding:0; }

/* Pulsing hotspot (heart) */
.pulse-hotspot { animation: pulse-heart 2s ease-in-out infinite; }
@keyframes pulse-heart { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 8px #FF0000} }

/* Hold bar */
.hold-bar { position:absolute; bottom:-4px; left:10px; right:10px; height:2px; background:#333; }
.hold-bar-fill { height:100%; width:0%; background:var(--red); }

/* Float text */
.float-text { position:absolute; font-family:'Press Start 2P',monospace; font-size:10px; pointer-events:none; z-index:30; }

/* ── DIALOGUE — ASCII box ── */
#dialogue { position:absolute; bottom:40px; left:50%; transform:translateX(-50%); width:640px; background:#000; border:1px solid var(--amber); display:none; flex-direction:column; padding:12px 16px; z-index:40; }
#dialogue.visible { display:flex; }
#portrait { display:none; }
#portrait canvas { display:none; }
#portrait-label { display:none; }
#dialogue-content { display:flex; flex-direction:column; }
#dialogue-text { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--amber); line-height:2.2; }
#dialogue-text .corrupt { color:var(--red); }
#dialogue-arrow { font-size:8px; color:var(--amber); margin-top:6px; text-align:right; display:none; }
#dialogue-arrow.visible { display:block; animation:blink-hard 0.5s step-start infinite; }

/* ── CURSOR ── */
#cursor { position:fixed; pointer-events:none; z-index:1000; transform:translate(-50%,-50%); }
#cursor svg { width:20px; height:20px; fill:none; stroke:var(--amber); stroke-width:1.5; }
</style>
</head>
<body>

<!-- CURSOR -->
<div id="cursor">
  <svg viewBox="0 0 24 24" id="cursor-svg">
    <circle cx="12" cy="12" r="8" />
    <circle cx="12" cy="12" r="2" fill="currentColor" />
  </svg>
</div>

<!-- GAME -->
<div id="game">

  <!-- LEFT PANEL -->
  <div class="panel" id="panel-left">
    <canvas class="panel-canvas" id="panel-left-bg"></canvas>
    <div class="panel-content">
      <div class="panel-title">ressources</div>
      <div class="res-row" id="res-d"><span class="res-label" style="color:var(--col-d)">D</span><div class="res-shapes" id="shapes-d"></div><span class="res-num" id="num-d"></span></div>
      <div class="res-row" id="res-s"><span class="res-label" style="color:var(--col-s)">S</span><div class="res-shapes" id="shapes-s"></div><span class="res-num" id="num-s"></span></div>
      <div class="res-row" id="res-o"><span class="res-label" style="color:var(--col-o)">O</span><div class="res-shapes" id="shapes-o"></div><span class="res-num" id="num-o"></span></div>
      <div id="vitality-bar"></div>
      <div id="decay-bar"></div>
      <button id="btn-reset" class="btn-dos">[ reset ]</button>
    </div>
  </div>

  <!-- SCENE -->
  <div id="scene-wrapper">
    <div id="pixi-container">
      <div id="hotspot-layer"></div>
      <div id="dialogue">
        <div id="portrait"><canvas width="16" height="16"></canvas><span id="portrait-label">ANOMALIE</span></div>
        <div id="dialogue-content"><div id="dialogue-text"></div><div id="dialogue-arrow">▼</div></div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel" id="panel-right">
    <canvas class="panel-canvas" id="panel-right-bg"></canvas>
    <div class="panel-content">
      <div class="panel-title">alchimie</div>
      <button id="btn-voir" class="btn-dos">[ voir ]</button>
      <div id="recipe-list"></div>
      <div id="alchemy-msg">— trouve un point d'invocation</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// ORGANIC PANEL BACKGROUNDS
// ══════════════════════════════════════
function drawPanelBg(canvasId) {
  const canvas = document.getElementById(canvasId);
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // Base fill
  ctx.fillStyle = '#100b0a';
  ctx.fillRect(0, 0, w, h);

  // Big chunky pixel grain — 4x4 blocks like the scene
  const imgData = ctx.getImageData(0, 0, w, h);
  const blockSize = 4;
  for (let by = 0; by < h; by += blockSize) {
    for (let bx = 0; bx < w; bx += blockSize) {
      const noise = (Math.random() - 0.5) * 20;
      const tint = Math.random() < 0.03 ? 8 + Math.random() * 12 : 0; // rare crimson speck
      for (let dy = 0; dy < blockSize && by+dy < h; dy++) {
        for (let dx = 0; dx < blockSize && bx+dx < w; dx++) {
          const i = ((by+dy) * w + (bx+dx)) * 4;
          imgData.data[i]   += noise + tint;
          imgData.data[i+1] += noise;
          imgData.data[i+2] += noise;
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function drawPanels() {
  drawPanelBg('panel-left-bg');
  drawPanelBg('panel-right-bg');
}

// ══════════════════════════════════════
// PIXI.JS SCENE
// ══════════════════════════════════════
const pixiContainer = document.getElementById('pixi-container');
const app = new PIXI.Application({
  width: 960,
  height: 720,
  backgroundAlpha: 0,
  antialias: false,
});
pixiContainer.insertBefore(app.view, pixiContainer.firstChild);
app.view.style.position = 'absolute';
app.view.style.inset = '0';
app.view.style.width = '100%';
app.view.style.height = '100%';
app.view.style.zIndex = '0';

let sceneSprite = null;

// Scenes that have real images
const REAL_IMAGES = {'desert-bg-1.png':true, '01b.png':true};

function setupPixiScene(imagePath) {
  if (sceneSprite) { app.stage.removeChild(sceneSprite); sceneSprite.destroy(); }

  if (REAL_IMAGES[imagePath]) {
    const tex = PIXI.Texture.from(imagePath);
    sceneSprite = new PIXI.Sprite(tex);
  } else {
    // Generate placeholder canvas
    const c = document.createElement('canvas'); c.width=960; c.height=720;
    const ctx = c.getContext('2d');
    drawPlaceholderScene(ctx, 960, 720, imagePath);
    sceneSprite = new PIXI.Sprite(PIXI.Texture.from(c));
  }
  sceneSprite.width = 960; sceneSprite.height = 720;
  app.stage.addChildAt(sceneSprite, 0);
}

// ══════════════════════════════════════
// PLACEHOLDER SCENE DRAWINGS
// ══════════════════════════════════════
function drawPlaceholderScene(ctx, w, h, id) {
  // Base — dark gradient
  ctx.fillStyle = '#080506';
  ctx.fillRect(0, 0, w, h);

  if (id === 'scene-01c' || id === 'desert-bg-1.png-01c') {
    // Dunes lointaines — flatter, distant shapes
    const grd = ctx.createLinearGradient(0, h*0.3, 0, h);
    grd.addColorStop(0, '#0a0506'); grd.addColorStop(0.3, '#1a0c0b'); grd.addColorStop(1, '#2a1210');
    ctx.fillStyle = grd; ctx.fillRect(0, h*0.3, w, h*0.7);
    // Horizon line
    ctx.strokeStyle = '#3a1a14'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, h*0.35); ctx.lineTo(w, h*0.32); ctx.stroke();
    // Couteau placeholder
    ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(w*0.45, h*0.5); ctx.lineTo(w*0.45, h*0.68); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w*0.43, h*0.68); ctx.lineTo(w*0.47, h*0.68); ctx.stroke();
    // Entity silhouette — distant, deformed
    ctx.fillStyle = '#1a0c0b';
    ctx.beginPath(); ctx.moveTo(w*0.7, h*0.48); ctx.lineTo(w*0.68, h*0.2); ctx.lineTo(w*0.72, h*0.18);
    ctx.lineTo(w*0.75, h*0.25); ctx.lineTo(w*0.78, h*0.15); ctx.lineTo(w*0.74, h*0.48); ctx.closePath(); ctx.fill();
    // Heart semi-buried
    ctx.fillStyle = '#4a1010';
    ctx.beginPath();
    ctx.moveTo(w*0.27, h*0.72);
    ctx.bezierCurveTo(w*0.24,h*0.66, w*0.28,h*0.62, w*0.27,h*0.66);
    ctx.bezierCurveTo(w*0.30,h*0.62, w*0.34,h*0.66, w*0.30,h*0.72);
    ctx.closePath(); ctx.fill();
    // Label
    drawSceneLabel(ctx, w, h, '01c — DUNES LOINTAINES');

  } else if (id === 'desert-house-bg.png' || id === 'scene-02') {
    // Cimetière d'os
    const grd = ctx.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, '#060304'); grd.addColorStop(0.4, '#120808'); grd.addColorStop(1, '#1a0c0b');
    ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);
    // Ground
    ctx.fillStyle = '#140a09'; ctx.fillRect(0, h*0.5, w, h*0.5);
    // Bones scattered
    ctx.strokeStyle = '#3a2a24'; ctx.lineWidth = 2;
    for (let i = 0; i < 15; i++) {
      const bx = w*0.1 + Math.random()*w*0.8;
      const by = h*0.45 + Math.random()*h*0.4;
      const angle = Math.random() * Math.PI;
      ctx.save(); ctx.translate(bx, by); ctx.rotate(angle);
      ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.stroke();
      ctx.beginPath(); ctx.arc(-15, 0, 3, 0, Math.PI*2); ctx.arc(15, 0, 3, 0, Math.PI*2); ctx.fillStyle='#2a1a16'; ctx.fill();
      ctx.restore();
    }
    // Skull
    ctx.fillStyle = '#2a1a16';
    ctx.beginPath(); ctx.arc(w*0.65, h*0.4, 20, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0a0506';
    ctx.beginPath(); ctx.arc(w*0.62, h*0.38, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*0.68, h*0.38, 4, 0, Math.PI*2); ctx.fill();
    drawSceneLabel(ctx, w, h, '02 — CIMETIÈRE D\'OS');

  } else if (id === 'scene-03') {
    // Maison délabrée
    const grd = ctx.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, '#060304'); grd.addColorStop(1, '#1a0c0b');
    ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);
    // Ground
    ctx.fillStyle = '#140a09'; ctx.fillRect(0, h*0.65, w, h*0.35);
    // House shape
    ctx.fillStyle = '#1a100e';
    ctx.fillRect(w*0.25, h*0.25, w*0.5, h*0.4);
    // Roof
    ctx.beginPath(); ctx.moveTo(w*0.2, h*0.25); ctx.lineTo(w*0.5, h*0.08); ctx.lineTo(w*0.8, h*0.25); ctx.closePath();
    ctx.fillStyle = '#1e1210'; ctx.fill();
    // Door
    ctx.fillStyle = '#0a0506'; ctx.fillRect(w*0.45, h*0.4, w*0.1, h*0.25);
    // Window
    ctx.fillStyle = '#2a1210'; ctx.fillRect(w*0.6, h*0.32, w*0.08, h*0.08);
    ctx.strokeStyle = '#0a0506'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(w*0.64, h*0.32); ctx.lineTo(w*0.64, h*0.4); ctx.stroke();
    // Chimney
    ctx.fillStyle = '#1e1210'; ctx.fillRect(w*0.35, h*0.08, w*0.04, h*0.17);
    drawSceneLabel(ctx, w, h, '03 — MAISON DÉLABRÉE');

  } else if (id === 'scene-04') {
    // Grotte
    ctx.fillStyle = '#030202'; ctx.fillRect(0, 0, w, h);
    // Cave opening
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(w*0.2, 0); ctx.bezierCurveTo(w*0.25, h*0.3, w*0.15, h*0.6, 0, h*0.7);
    ctx.closePath(); ctx.fillStyle = '#0a0506'; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(w, 0); ctx.lineTo(w*0.8, 0); ctx.bezierCurveTo(w*0.75, h*0.25, w*0.85, h*0.55, w, h*0.65);
    ctx.closePath(); ctx.fill();
    // Stalactites
    ctx.fillStyle = '#1a100e';
    for (let i = 0; i < 8; i++) {
      const sx = w*0.2 + Math.random()*w*0.6;
      const sh = 20 + Math.random()*40;
      ctx.beginPath(); ctx.moveTo(sx-4, 0); ctx.lineTo(sx, sh); ctx.lineTo(sx+4, 0); ctx.closePath(); ctx.fill();
    }
    drawSceneLabel(ctx, w, h, '04 — LA GROTTE');

  } else if (id === 'scene-05') {
    // Le Ciel
    ctx.fillStyle = '#060308'; ctx.fillRect(0, 0, w, h);
    // Stars/failles
    for (let i = 0; i < 30; i++) {
      ctx.fillStyle = `rgba(190,55,45,${0.1+Math.random()*0.3})`;
      ctx.fillRect(Math.random()*w, Math.random()*h*0.6, 1+Math.random()*2, 1+Math.random()*2);
    }
    // 3 failles
    ctx.strokeStyle = '#8C1C1C'; ctx.lineWidth = 2;
    [[w*0.25,h*0.25],[w*0.55,h*0.3],[w*0.8,h*0.2]].forEach(([fx,fy]) => {
      ctx.beginPath(); ctx.moveTo(fx-10,fy-15); ctx.lineTo(fx+5,fy+15); ctx.stroke();
      const g = ctx.createRadialGradient(fx,fy,0,fx,fy,25);
      g.addColorStop(0,'rgba(190,55,45,0.15)'); g.addColorStop(1,'transparent');
      ctx.fillStyle = g; ctx.fillRect(fx-25,fy-25,50,50);
    });
    // Desert below
    ctx.fillStyle = '#1a0c0b'; ctx.fillRect(0, h*0.75, w, h*0.25);
    drawSceneLabel(ctx, w, h, '05 — LE CIEL');

  } else {
    // Generic fallback
    drawSceneLabel(ctx, w, h, 'SCENE PLACEHOLDER');
  }

  // Grain on all placeholders
  const imgData = ctx.getImageData(0, 0, w, h);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const n = (Math.random()-0.5)*8;
    imgData.data[i]+=n; imgData.data[i+1]+=n; imgData.data[i+2]+=n;
  }
  ctx.putImageData(imgData, 0, 0);
}

function drawSceneLabel(ctx, w, h, text) {
  ctx.font = '10px "Press Start 2P", monospace';
  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  ctx.fillText(text, w/2, h - 12);
}

// ══════════════════════════════════════
// LOW VITALITY FX — lightweight, no GPU filters
// ══════════════════════════════════════
let pixelFlickerTimer = null;

function startPixelFlicker() {
  if (pixelFlickerTimer) return;
  const layer = document.getElementById('hotspot-layer');
  pixelFlickerTimer = setInterval(() => {
    if (!state || state.vitality >= 5) return; // only below 50%
    const count = Math.max(1, Math.floor((1 - state.vitality / state.vitalityMax) * 12));
    for (let i = 0; i < count; i++) {
      const px = document.createElement('div');
      const size = 4 + Math.floor(Math.random() * 12);
      px.style.cssText = `position:absolute;left:${Math.random()*920}px;top:${Math.random()*680}px;width:${size}px;height:${size}px;background:#000;pointer-events:none;z-index:15;`;
      layer.appendChild(px);
      setTimeout(() => px.remove(), 80 + Math.random() * 150);
    }
  }, 2000 + Math.random() * 2000);
}

function stopPixelFlicker() {
  if (pixelFlickerTimer) { clearInterval(pixelFlickerTimer); pixelFlickerTimer = null; }
}
// ══════════════════════════════════════
// SVG RESOURCE SHAPES
// ══════════════════════════════════════
const RES_CHARS = { douleur:'█', souffle:'█', organique:'█' };
const RES_EMPTY = '░';
const RES_COLORS = { douleur:'var(--red)', souffle:'var(--amber)', organique:'var(--amber)' };

// ══════════════════════════════════════
// CURSOR (animated SVG)
// ══════════════════════════════════════
const cursorEl = document.getElementById('cursor');
const cursorSvg = document.getElementById('cursor-svg');
let cursorType = 'default';
let cursorTween = null;

function setCursor(type) {
  if (type === cursorType) return;
  cursorType = type;
  const svg = cursorSvg;
  svg.style.stroke = type==='hand'?'#FF0000':type==='flame'?'#FF0000':type==='exit'?'#FFAA00':type==='locked'?'#333':'#FFAA00';
}

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

// ══════════════════════════════════════
// PORTRAIT
// ══════════════════════════════════════
function drawPortrait() {
  const canvas = document.querySelector('#portrait canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#080506';
  ctx.fillRect(0, 0, 16, 16);
  // Imperfect 6-pointed star — two offset triangles
  ctx.fillStyle = '#3A3230';
  ctx.beginPath(); ctx.moveTo(8,2); ctx.lineTo(13,11); ctx.lineTo(3,11); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(7,14); ctx.lineTo(2,6); ctx.lineTo(13,6); ctx.closePath(); ctx.fill();
  // Crimson edges
  ctx.strokeStyle = '#8C1C1C'; ctx.lineWidth = 0.5;

function enterZoom(zoomId){
  const zoom=ZOOM_SCENES[zoomId];if(!zoom)return;currentZoom=zoomId;
  const imgSrc=zoom.getImage();
  // Load image as PixiJS texture
  if(sceneSprite){app.stage.removeChild(sceneSprite);sceneSprite.destroy()}
  const tex=PIXI.Texture.from(imgSrc);
  sceneSprite=new PIXI.Sprite(tex);sceneSprite.width=960;sceneSprite.height=720;
  app.stage.addChildAt(sceneSprite,0);

  hotspotLayer.querySelectorAll('.hotspot,.exit-zone').forEach(e=>e.remove());

  // Zoom hotspots
  zoom.hotspots.forEach(hs=>{
    const el=document.createElement('button');el.className='hotspot';el.id='hs-el-'+hs.id;
    el.style.cssText=`left:${hs.x/100*960}px;top:${hs.y/100*720}px;width:${hs.w/100*960}px;height:${hs.h/100*720}px`;
    el.addEventListener('mouseenter',()=>setCursor(hs.cursor||'eye'));
    el.addEventListener('mouseleave',()=>setCursor('default'));
    el.addEventListener('click',()=>{
      if(hs.action==='collect-souffle'){
        const key='scene-01a:hs-trace-souffle';
        if(state.souffleCollected[key]){showDialogue("Il ne reste plus rien ici.");return}
        const ok=collectResource('souffle',1,hs.x+hs.w/2,hs.y+hs.h/2);
        if(ok){state.souffleCollected[key]=true;saveState()}
        if(hs.texts&&hs.texts.length)showDialogue(hs.texts[Math.floor(Math.random()*hs.texts.length)]);
        el.style.display='none';
        return;
      }
      if(hs.action==='collect-organique'){
        // Cooldown 60s between hair pulls
        const lastPull=state.narrativeFlags['hair-last-pull']||0;
        if(Date.now()-lastPull<60000){showDialogue("Ça repousse. Reviens plus tard.");return}
        const ok=collectResource('organique',1,hs.x+hs.w/2,hs.y+hs.h/2);
        if(ok){state.narrativeFlags['hair-last-pull']=Date.now();saveState()}
        if(hs.texts&&hs.texts.length)showDialogue(hs.texts[Math.floor(Math.random()*hs.texts.length)]);
        return;
      }
      if(hs.action==='collect-plume'){
        state.narrativeFlags['plume-noire']=true;
        state.inspected[state.currentScene+':hs-plume']=true;
        saveState();updateRecipeUI();
        if(hs.texts&&hs.texts.length)showDialogue(hs.texts[Math.floor(Math.random()*hs.texts.length)]);
        el.style.display='none';
        return;
      }
      if(hs.action==='smash-head'){
        const ok=collectResource('douleur',1,hs.x+hs.w/2,hs.y+hs.h/2);
        if(ok){
          rocherHits=Math.min(rocherHits+1,2);
          flashPain();
          // Screen shake
          const container=document.getElementById('pixi-container');
          const intensity=rocherHits===1?6:10;
          let shakeCount=0;
          const shakeInterval=setInterval(()=>{
            const dx=(Math.random()-0.5)*intensity;
            const dy=(Math.random()-0.5)*intensity;
            container.style.transform=`translate(${dx}px,${dy}px)`;
            shakeCount++;
            if(shakeCount>8){clearInterval(shakeInterval);container.style.transform=''}
          },30);
          // Swap to bloodier image
          const newTex=PIXI.Texture.from(ROCHER_IMAGES[rocherHits]);
          sceneSprite.texture=newTex;
        }
        if(hs.texts&&hs.texts.length)showDialogue(hs.texts[Math.floor(Math.random()*hs.texts.length)]);
      }
    });
    hotspotLayer.appendChild(el);
  });

  // Return zone — bottom 20%
  const ret=document.createElement('button');ret.className='exit-zone';
  ret.style.cssText=`left:0;top:${720*0.8}px;width:960px;height:${720*0.2}px`;
  ret.addEventListener('mouseenter',()=>setCursor('exit'));
  ret.addEventListener('mouseleave',()=>setCursor('default'));
  ret.addEventListener('click',()=>exitZoom());
  hotspotLayer.appendChild(ret);

  if(zoom.introText)setTimeout(()=>showDialogue(zoom.introText),300);
}

const GLITCHS='░▒▓█▄▀■□▪▫';
function glitchText(t){if(state.vitality>2)return t;return t.split('').map(c=>Math.random()<0.12?GLITCHS[Math.floor(Math.random()*GLITCHS.length)]:c).join('')}

function updateResourceUI(){

function updateRecipeUI(){

let typingTimer=null,dialogueFinished=false,dialogueFullText='';
function showDialogue(text){
  clearTyping();dialogueFullText=text;dialogueFinished=false;dialogueText.textContent='';
  dialogueArrow.classList.remove('visible');
  dialogueEl.classList.add('visible');
  const chars=text.split('');let i=0;
  function typeNext(){if(i>=chars.length){dialogueFinished=true;dialogueArrow.classList.add('visible');return}
    let ch=chars[i];if(state.vitality<=1&&Math.random()<0.125){const sp=document.createElement('span');sp.className='corrupt';sp.textContent=GLITCHS[Math.floor(Math.random()*GLITCHS.length)];dialogueText.appendChild(sp)}
    else dialogueText.appendChild(document.createTextNode(ch));i++;
    typingTimer=setTimeout(typeNext,15+Math.random()*25+(ch==='.'||ch==='—'?120:0))}
  typeNext();
}
function clearTyping(){if(typingTimer){clearTimeout(typingTimer);typingTimer=null}}
function closeDialogue(){if(!dialogueFinished){clearTyping();dialogueText.textContent=dialogueFullText;dialogueFinished=true;dialogueArrow.classList.add('visible');return}dialogueEl.classList.remove('visible');dialogueFinished=false}

function floatText(x,y,text,color){const el=document.createElement('div');el.className='float-text';el.textContent=text;el.style.color=color;el.style.left=(x/100*SCENE_W)+'px';el.style.top=(y/100*SCENE_H)+'px';hotspotLayer.appendChild(el);gsap.fromTo(el,{y:0,opacity:1},{y:-40,opacity:0,duration:1,ease:'expo.out',onComplete:()=>el.remove()})}
function flashPain(){const f=document.createElement('div');f.style.cssText='position:absolute;inset:0;background:var(--crimson);pointer-events:none;z-index:20;opacity:0';hotspotLayer.appendChild(f);gsap.fromTo(f,{opacity:0.35},{opacity:0,duration:0.3,ease:'power4.in',onComplete:()=>f.remove()})}

// ══════════════════════════════════════
// RESOURCE + VITALITY + CRAFT
// ══════════════════════════════════════
function collectResource(type,amount,hx,hy){if(state.inventory[type]>=CAPS[type]){if(type==='douleur')showDialogue("Tu ne peux pas porter plus que ça.");return false}const actual=Math.min(amount,CAPS[type]-state.inventory[type]);state.inventory[type]+=actual;if(type==='douleur'){loseVitality(actual);flashPain()}if(type==='organique')checkDecayStart();floatText(hx+2,hy-5,'+'+actual,RES_COLORS[type]);updateResourceUI();saveState();return true}
function loseVitality(n){state.vitality=Math.max(0,state.vitality-n);updateVitalityUI();saveState();if(state.vitality<state.vitalityMax)startPixelFlicker();if(state.vitality===0)triggerDeath()}
function triggerDeath(){stopPixelFlicker();const ov=document.createElement('div');ov.style.cssText='position:absolute;inset:0;background:#000;opacity:0;z-index:50;pointer-events:none';hotspotLayer.parentElement.appendChild(ov);gsap.to(ov,{opacity:1,duration:3,ease:'power2.in'});setTimeout(()=>showDialogue("Tu t'es dissous avant d'avoir compris."),1500);setTimeout(()=>{resetState();ov.remove();loadScene(state.currentScene)},5000)}
function craftRecipe(r){
  for(const[k,v]of Object.entries(r.cost))state.inventory[k]-=v;
  state.crafted.push(r.id);
  // Set flag
  if(r.flag)state.narrativeFlags[r.flag]=true;
  // Track craft-specific flags for recipe unlocks
  if(r.id==='lien-nerfs')state.narrativeFlags['lien-nerfs-crafted']=true;
  if(r.id==='armure-peau'&&state.narrativeFlags['plume-noire'])state.narrativeFlags['armure-peau-plume']=true;
  // Dissolution for divines
  if(r.dissolutionDelta){state.painLevel=Math.min(1,state.painLevel+(r.dissolutionDelta||0))}
  // Mechanic
  if(r.mechanic==='unlock-exit'){
    // Search all scenes for the target exit
    for(const sid in SCENES){const scene=SCENES[sid];const exit=scene.exits.find(e=>e.id===r.targetExit);if(exit){state.exits[exit.id]=true;if(sid===state.currentScene)renderExits(scene);break}}
  }
  if(r.mechanic==='pain-absorb')state.painAbsorbActive=true;
  showDialogue(r.sceneReaction);updateResourceUI();updateRecipeUI();saveState();
}
function revealConditionalHotspots(rid){SCENES[state.currentScene].hotspots.forEach(hs=>{if(hs.unlockedBy===rid){const el=document.getElementById('hs-el-'+hs.id);if(el){el.style.display='block';gsap.fromTo(el,{opacity:0},{opacity:1,duration:1.5,ease:'expo.out'})}}})}

let holdTimer=null,holdStart=0,holdHs=null,holdTierIndex=0,holdBarEl=null;
function startHold(hs,el){holdHs=hs;holdStart=Date.now();holdTierIndex=0;holdBarEl=document.createElement('div');holdBarEl.className='hold-bar';holdBarEl.innerHTML='<div class="hold-bar-fill"></div>';el.appendChild(holdBarEl);holdTimer=setInterval(()=>{const elapsed=Date.now()-holdStart;const pct=Math.min(elapsed/hs.holdMax*100,100);holdBarEl.querySelector('.hold-bar-fill').style.width=pct+'%';while(holdTierIndex<hs.holdTiers.length&&elapsed>=hs.holdTiers[holdTierIndex].ms){const tier=hs.holdTiers[holdTierIndex];if(tier.resource)collectResource(tier.resource.type,tier.resource.amount,hs.x,hs.y);if(tier.text)showDialogue(tier.text);if(tier.painDelta){state.painLevel=Math.min(1,state.painLevel+tier.painDelta);saveState()}holdTierIndex++}if(elapsed>=hs.holdMax)endHold()},50)}
function endHold(){if(holdTimer){clearInterval(holdTimer);holdTimer=null}if(holdBarEl){holdBarEl.remove();holdBarEl=null}holdHs=null}

// ══════════════════════════════════════
// DECAY
// ══════════════════════════════════════
let decayTimer=null;
const decayBar=$('decay-bar');

function getDecayStart(){return state.organicDecayStart}
function setDecayStart(v){state.organicDecayStart=v;saveState()}

function startDecayTimer(){
  stopDecayTimer();
  // Restore from saved state or init
  if(state.inventory.organique>0&&!state.organicDecayStart){setDecayStart(Date.now())}
  // Calculate missed decays since last save
  if(state.organicDecayStart&&state.inventory.organique>0){
    const missed=Math.floor((Date.now()-state.organicDecayStart)/ORGANIQUE_DECAY_MS);
    if(missed>0){
      const lost=Math.min(missed,state.inventory.organique);
      state.inventory.organique-=lost;
      setDecayStart(state.inventory.organique>0?Date.now():null);
      updateResourceUI();saveState();
    }
  }
  decayTimer=setInterval(()=>{
    if(state.inventory.organique>0){
      state.inventory.organique--;
      if(!state.narrativeFlags['decay-warning']){
        showDialogue("Ça se décompose. La chair ne tient pas longtemps hors du corps. Tu aurais dû t'en douter.");
        state.narrativeFlags['decay-warning']=true;
      }else{
        showDialogue("Quelque chose de putréfié se détache de toi. Tu as perdu quelque chose.");
      }
      setDecayStart(state.inventory.organique>0?Date.now():null);
      updateResourceUI();saveState();
    }else{
      setDecayStart(null);
    }
  },ORGANIQUE_DECAY_MS);
}
function stopDecayTimer(){if(decayTimer){clearInterval(decayTimer);decayTimer=null}}

function checkDecayStart(){
  if(state.inventory.organique>0&&!state.organicDecayStart){setDecayStart(Date.now())}
  if(state.inventory.organique<=0){setDecayStart(null)}
}

// Decay bar — visible only when decomposition is active (organique > 5)
const DECAY_BLOCKS=10;
function updateDecayBar(){
  const active=state.inventory.organique>0&&state.organicDecayStart;
  if(!active){decayBar.style.display='none';requestAnimationFrame(updateDecayBar);return}
  decayBar.style.display='block';
  decayBar.innerHTML='';
  const elapsed=Date.now()-state.organicDecayStart;
  const pct=Math.max(0,1-elapsed/ORGANIQUE_DECAY_MS);
  const filled=Math.ceil(pct*DECAY_BLOCKS);
  for(let i=0;i<DECAY_BLOCKS;i++){
    const s=document.createElement('span');
    s.className='decay-dash';
    s.textContent=i<filled?'█':'░';
    if(i<filled){s.classList.add('full');if(filled<=2)s.classList.add('low')}
    decayBar.appendChild(s);
  }
  requestAnimationFrame(updateDecayBar);
}
updateDecayBar();

function transitionToScene(tid){const ov=document.createElement('canvas');ov.style.cssText='position:absolute;inset:0;z-index:45;pointer-events:none';ov.width=960;ov.height=720;hotspotLayer.parentElement.appendChild(ov);const ctx=ov.getContext('2d');let p=0;const dissolve=()=>{p+=0.03;ctx.clearRect(0,0,ov.width,ov.height);for(let x=0;x<ov.width;x+=4){for(let y=0;y<ov.height;y+=4){if(Math.sin(x*0.05)*Math.cos(y*0.07)+Math.random()*0.3<p){ctx.fillStyle=Math.random()>0.5?'#8C1C1C':'#080506';ctx.fillRect(x,y,4,4)}}}if(p<1.2)requestAnimationFrame(dissolve);else{loadScene(tid);let r=1.2;const reveal=()=>{r-=0.04;ctx.clearRect(0,0,ov.width,ov.height);for(let x=0;x<ov.width;x+=4){for(let y=0;y<ov.height;y+=4){if(Math.sin(x*0.05)*Math.cos(y*0.07)+Math.random()*0.3<r){ctx.fillStyle=Math.random()>0.5?'#8C1C1C':'#080506';ctx.fillRect(x,y,4,4)}}}if(r>0)requestAnimationFrame(reveal);else ov.remove()};requestAnimationFrame(reveal)}};requestAnimationFrame(dissolve)}

// ══════════════════════════════════════
// SCENE LOADING
// ══════════════════════════════════════
function loadScene(sceneId){
  const scene=SCENES[sceneId];if(!scene)return;state.currentScene=sceneId;activeAlchemyPoint=false;
  // Track visited scenes for recipe availability
  state.narrativeFlags['visited-'+sceneId]=true;
  setupPixiScene(scene.bg);
  hotspotLayer.querySelectorAll('.hotspot,.exit-zone').forEach(e=>e.remove());
  scene.hotspots.forEach(hs=>{const key=sceneId+':'+hs.id;
    if(hs.collectible&&hs.type==='souffle'&&state.souffleCollected[key])return;
    if(hs.collectible&&state.inspected[key]&&hs.type!=='organique')return;
    if(hs.collectible&&hs.type==='organique'&&state.organicRespawn[key]){if(Date.now()-state.organicRespawn[key]<(hs.respawnDelay||ORGANIQUE_RESPAWN_MS))return;else delete state.organicRespawn[key]}
    const isVisible=hs.visible||(hs.unlockedBy&&state.crafted.includes(hs.unlockedBy));
    const el=createHotspotEl(hs,sceneId);if(!isVisible)el.style.display='none';
  });
  renderExits(scene);
  if(!state.narrativeFlags['intro-'+sceneId]){
    if(scene.intro){setTimeout(()=>{showDialogue(scene.intro);state.narrativeFlags['intro-'+sceneId]=true;saveState()},600)}
    // First visit action — set flag for recipe unlock
    if(scene.firstVisitAction&&!state.narrativeFlags[scene.firstVisitAction]){
      state.narrativeFlags[scene.firstVisitAction]=true;
      if(scene.firstVisitText)setTimeout(()=>showDialogue(scene.firstVisitText),scene.intro?2500:600);
      state.narrativeFlags['intro-'+sceneId]=true;
      saveState();
    } else {
      state.narrativeFlags['intro-'+sceneId]=true;saveState();
    }
  }
  updateResourceUI();updateVitalityUI();updateRecipeUI();saveState();
}
const SCENE_W=960,SCENE_H=720;
function createHotspotEl(hs,sceneId){const el=document.createElement('button');el.className='hotspot'+(hs.type==='zoom'?' zoom-hs':'')+(hs.cssClass?' '+hs.cssClass:'');el.id='hs-el-'+hs.id;el.style.cssText=`left:${hs.x/100*SCENE_W}px;top:${hs.y/100*SCENE_H}px;width:${hs.w/100*SCENE_W}px;height:${hs.h/100*SCENE_H}px`;el.addEventListener('mouseenter',()=>setCursor(hs.cursor||'eye'));el.addEventListener('mouseleave',()=>setCursor('default'));if(hs.collectMode==='hold'){el.addEventListener('mousedown',e=>{e.preventDefault();startHold(hs,el)});el.addEventListener('mouseup',()=>endHold());el.addEventListener('mouseleave',()=>endHold())}else el.addEventListener('click',()=>handleHotspotClick(hs,el,sceneId));hotspotLayer.appendChild(el);return el}
function handleHotspotClick(hs,el,sceneId){
  if(hs.type==='zoom'&&hs.zoomScene){enterZoom(hs.zoomScene);return}
  if(hs.action==='manger-chose'){
    if(!state.narrativeFlags['has-machoire']){showDialogue("Tu ne peux pas. Il te manque quelque chose pour broyer.");return}
    if(!state.narrativeFlags['has-estomac']){showDialogue("Tu ne peux pas. Il n'y a nulle part où ça irait.");return}
    state.vitality=Math.min(state.vitalityMax,state.vitality+4);
    CAPS.douleur=7;
    state.narrativeFlags['chose-mangee']=true;
    showDialogue("C'est immonde. C'est la chose la plus réelle que tu aies faite depuis le début.");
    el.style.display='none';
    updateVitalityUI();updateResourceUI();saveState();return;
  }
  if(hs.action==='fin'){
    if(state.painLevel>=0.15){showDialogue("Ce n'est pas une punition. C'est une récolte. Tu avais planté plus que prévu.")}
    else{showDialogue("Quelque chose te reconnaît. Tu t'effaces.")}
    setTimeout(()=>{resetState();loadScene('scene-01a')},5000);return;
  }
  if(hs.flag){state.narrativeFlags[hs.flag]=true;saveState()}
  if(hs.action==='goto-01b'){transitionToScene('scene-01b');return}
  if(hs.action==='goto-01c'){
    if(!state.narrativeFlags['poumons']){showDialogue("Trop loin. Quelque chose manque à l'intérieur.");return}
    transitionToScene('scene-01c');return;
  }
  if(hs.action==='open-alchemy'){updateRecipeUI();return}if(hs.texts&&hs.texts.length)showDialogue(hs.texts[Math.floor(Math.random()*hs.texts.length)]);if(hs.resource){const ok=collectResource(hs.resource.type,hs.resource.amount,hs.x+hs.w/2,hs.y+hs.h/2);if(!ok)return;if(hs.flashOnCollect)flashPain();const key=sceneId+':'+hs.id;if(hs.collectible){state.inspected[key]=true;if(hs.souffleUnique)state.souffleCollected[key]=true;if(hs.type==='organique')state.organicRespawn[key]=Date.now();gsap.to(el,{opacity:0,scale:hs.type==='souffle'?1:0.6,duration:0.4,ease:'expo.out',onComplete:()=>el.remove()})}saveState()}if(!hs.resource&&hs.type==='inspect'){state.inspected[sceneId+':'+hs.id]=true;saveState()}}
function renderExits(scene){hotspotLayer.querySelectorAll('.exit-zone').forEach(e=>e.remove());scene.exits.forEach(exit=>{
  // Skip exits that aren't visible yet
  if(exit.visibleAfter&&!state.narrativeFlags[exit.visibleAfter])return;
  const el=document.createElement('button');el.className='exit-zone';el.style.cssText=`left:${exit.x/100*SCENE_W}px;top:${exit.y/100*SCENE_H}px;width:${exit.w/100*SCENE_W}px;height:${exit.h/100*SCENE_H}px`;const isLocked=exit.locked&&!state.exits[exit.id]&&!(exit.unlockedBy&&state.crafted.includes(exit.unlockedBy));if(isLocked){el.classList.add('locked');el.addEventListener('mouseenter',()=>setCursor('locked'));el.addEventListener('click',()=>showDialogue(exit.lockedText))}else if(exit.targetScene){el.addEventListener('mouseenter',()=>setCursor('exit'));el.addEventListener('click',()=>transitionToScene(exit.targetScene))}else{el.classList.add('locked');el.addEventListener('mouseenter',()=>setCursor('locked'));el.addEventListener('click',()=>showDialogue(exit.lockedText))}el.addEventListener('mouseleave',()=>setCursor('default'));hotspotLayer.appendChild(el)})}

// SCALE TO FIT
// ══════════════════════════════════════
function scaleGame(){
  const game=document.getElementById('game');
  const sx=window.innerWidth/1280;
  const sy=window.innerHeight/720;
  const s=Math.min(sx,sy);
  game.style.transform=`scale(${s})`;
  game.style.transformOrigin='top left';
  game.style.position='absolute';
  game.style.left=`${(window.innerWidth-1280*s)/2}px`;
  game.style.top=`${(window.innerHeight-720*s)/2}px`;
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
drawPortrait();
window.addEventListener('resize',()=>{scaleGame()});
scaleGame();
startDecayTimer();loadScene(state.currentScene);
